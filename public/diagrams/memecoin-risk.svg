<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 310" role="img">
<rect width="640" height="310" fill="#ffffff"/>
<line x1="0" y1="62" x2="640" y2="62" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="124" x2="640" y2="124" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="186" x2="640" y2="186" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="248" x2="640" y2="248" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="30" font-size="14" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ミームコインの典型的なリスク構造</text><rect x="45" y="60" width="260" height="105" rx="8" fill="#ffffff" stroke="#6b4fa0" stroke-width="2"/><rect x="45" y="60" width="260" height="30" rx="8" fill="#6b4fa0"/><rect x="45" y="82" width="260" height="8" fill="#6b4fa0"/><text x="175" y="81" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">価値の裏付け</text><text x="59" y="112" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">収益・利用実態などの</text><text x="59" y="132" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">裏付け資産がない</text><text x="59" y="152" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">→ 価格の拠り所は話題性のみ</text><rect x="335" y="60" width="260" height="105" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><rect x="335" y="60" width="260" height="30" rx="8" fill="#a3690f"/><rect x="335" y="82" width="260" height="8" fill="#a3690f"/><text x="465" y="81" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">保有の偏り</text><text x="349" y="112" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">少数の大口保有者に集中</text><text x="349" y="132" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">しがち → 大口の売りで</text><text x="349" y="152" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">価格が崩れやすい</text><rect x="45" y="185" width="260" height="105" rx="8" fill="#ffffff" stroke="#1f6e50" stroke-width="2"/><rect x="45" y="185" width="260" height="30" rx="8" fill="#1f6e50"/><rect x="45" y="207" width="260" height="8" fill="#1f6e50"/><text x="175" y="206" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">流動性</text><text x="59" y="237" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">買い手が細ると</text><text x="59" y="257" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">売りたくても売れない</text><text x="59" y="277" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">→ 急落が加速しやすい</text><rect x="335" y="185" width="260" height="105" rx="8" fill="#ffffff" stroke="#c73e2e" stroke-width="2"/><rect x="335" y="185" width="260" height="30" rx="8" fill="#c73e2e"/><rect x="335" y="207" width="260" height="8" fill="#c73e2e"/><text x="465" y="206" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">詐欺・規制</text><text x="349" y="237" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">開発者の持ち逃げ（ラグプル）</text><text x="349" y="257" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">や詐欺的な宣伝の事例</text><text x="349" y="277" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">→ 規制・注意喚起の対象に</text>
</svg>