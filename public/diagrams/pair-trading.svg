<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 275" role="img">
<rect width="640" height="275" fill="#ffffff"/>
<line x1="0" y1="55" x2="640" y2="55" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="110" x2="640" y2="110" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="165" x2="640" y2="165" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="220" x2="640" y2="220" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="26" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">さや取り（ペアトレード）：2つの値動きの「差」だけを取る</text><polyline points="60,150 120,130 180,140 240,110 300,95 360,115 420,100 480,108" fill="none" stroke="#0075c2" stroke-width="2.2"  stroke-linejoin="round" stroke-linecap="round"/><polyline points="60,165 120,148 180,160 240,145 300,150 360,132 420,118 480,122" fill="none" stroke="#1f6e50" stroke-width="2.2"  stroke-linejoin="round" stroke-linecap="round"/><text x="500" y="105" font-size="11" fill="#0075c2" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">銘柄A</text><text x="500" y="128" font-size="11" fill="#1f6e50" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">銘柄B</text><line x1="300" y1="95" x2="300" y2="150" stroke="#a3690f" stroke-width="2" stroke-dasharray="4 3" stroke-linecap="round"/><text x="300" y="175" font-size="10.5" fill="#a3690f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">サヤ拡大</text><text x="300" y="192" font-size="10" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">割高Aを売り・割安Bを買い</text><line x1="480" y1="108" x2="480" y2="122" stroke="#a3690f" stroke-width="2" stroke-dasharray="4 3" stroke-linecap="round"/><text x="462" y="145" font-size="10" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">サヤ収縮で両建て解消</text><text x="320" y="235" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">市場全体が上がっても下がっても、2つの「差」が縮めば利益になる＝相場の方向に賭けない</text><text x="320" y="256" font-size="10.5" fill="#c73e2e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">前提は「AとBは長期的に連動する」という関係の持続。関係が壊れると両側で損失もありうる</text>
</svg>