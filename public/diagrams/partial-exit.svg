<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 250" role="img">
<rect width="640" height="250" fill="#ffffff"/>
<line x1="0" y1="50" x2="640" y2="50" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="100" x2="640" y2="100" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="150" x2="640" y2="150" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="200" x2="640" y2="200" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="28" font-size="13.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">分割利確の代表的な3つの型</text><rect x="40" y="55" width="180" height="145" rx="8" fill="#ffffff" stroke="#2b4a8b" stroke-width="2"/><rect x="40" y="55" width="180" height="30" rx="8" fill="#2b4a8b"/><rect x="40" y="77" width="180" height="8" fill="#2b4a8b"/><text x="130" y="76" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">半分＋トレール型</text><text x="54" y="107" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">目標到達で半分を確定し</text><text x="54" y="127" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">残り半分をトレーリング</text><text x="54" y="147" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif"></text><text x="54" y="167" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「確実さ」と「大相場」の</text><text x="54" y="187" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">両取りを狙う最多数派</text><rect x="230" y="55" width="180" height="145" rx="8" fill="#ffffff" stroke="#1f6e50" stroke-width="2"/><rect x="230" y="55" width="180" height="30" rx="8" fill="#1f6e50"/><rect x="230" y="77" width="180" height="8" fill="#1f6e50"/><text x="320" y="76" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">3分割型</text><text x="244" y="107" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">+1R/+2R/+3Rなど</text><text x="244" y="127" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">段階ごとに1/3ずつ確定</text><text x="244" y="147" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif"></text><text x="244" y="167" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">損益曲線が滑らかになり</text><text x="244" y="187" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">心理的に続けやすい</text><rect x="420" y="55" width="180" height="145" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><rect x="420" y="55" width="180" height="30" rx="8" fill="#a3690f"/><rect x="420" y="77" width="180" height="8" fill="#a3690f"/><text x="510" y="76" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">建値ストップ型</text><text x="434" y="107" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">最初の利確後、残りの</text><text x="434" y="127" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">損切りを建値に引き上げ</text><text x="434" y="147" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif"></text><text x="434" y="167" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「負けない状態」を作って</text><text x="434" y="187" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">から利益を追う</text><text x="320" y="232" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">共通の代償：一括で最良の出口を当てた場合より総利益は減る。買っているのは「結果のブレの小ささ」</text>
</svg>