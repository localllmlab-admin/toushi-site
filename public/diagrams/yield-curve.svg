<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 305" role="img">
<rect width="640" height="305" fill="#ffffff"/>
<line x1="0" y1="61" x2="640" y2="61" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="122" x2="640" y2="122" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="183" x2="640" y2="183" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="244" x2="640" y2="244" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="28" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">イールドカーブ＝期間ごとの金利をつないだ曲線</text><polyline points="80,220 180,190 280,170 380,158 480,150 560,146" fill="none" stroke="#c73e2e" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><polyline points="80,160 180,175 280,190 380,200 480,208 560,212" fill="none" stroke="#0075c2" stroke-width="2.5" stroke-dasharray="6 3" stroke-linejoin="round" stroke-linecap="round"/><line x1="80" y1="240" x2="560" y2="240" stroke="#26313f" stroke-width="1.5"  stroke-linecap="round"/><text x="130" y="258" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">1年</text><text x="230" y="258" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">5年</text><text x="330" y="258" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">10年</text><text x="430" y="258" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">20年</text><text x="530" y="258" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">30年</text><text x="565" y="150" font-size="11.5" fill="#c73e2e" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">順イールド</text><text x="565" y="216" font-size="11.5" fill="#0075c2" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">逆イールド</text><text x="320" y="290" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">通常は長い期間ほど金利が高い（順）。短期＞長期の逆転（逆イールド）は景気後退の先行サインとして注目されてきた</text>
