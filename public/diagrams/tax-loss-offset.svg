<rect width="640" height="270" fill="#ffffff"/>
<line x1="0" y1="54" x2="640" y2="54" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="108" x2="640" y2="108" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="162" x2="640" y2="162" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="216" x2="640" y2="216" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="28" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">損益通算：損失の確定が税負担を軽くする（上場株式等・概要）</text><rect x="70" y="60" width="150" height="60" rx="8" fill="#e8f6ec" stroke="#1d7a3e" stroke-width="2"/><text x="145" y="85" font-size="12.5" fill="#1d7a3e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">A株の利益</text><text x="145" y="106" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">+100万円</text><rect x="70" y="140" width="150" height="60" rx="8" fill="#fdecea" stroke="#c73e2e" stroke-width="2"/><text x="145" y="165" font-size="12.5" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">B株の損切り</text><text x="145" y="186" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">−40万円</text><line x1="230" y1="130" x2="300" y2="130" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="300,130 291.8959760788259,133.91468980700108 291.8959760788259,126.08531019299893" fill="#57606e"/><rect x="310" y="95" width="180" height="70" rx="8" fill="#e9f2fb" stroke="#0075c2" stroke-width="2"/><text x="400" y="122" font-size="12" fill="#26313f" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">課税対象は相殺後の</text><text x="400" y="145" font-size="14" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">60万円に</text><text x="400" y="200" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（相殺しきれない損失は</text><text x="400" y="216" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">　確定申告で翌年以後3年間繰越可）</text><text x="320" y="255" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">損切りには「税負担の軽減」という現実的な副産物がある。※NISA口座の損失は損益通算不可</text>
