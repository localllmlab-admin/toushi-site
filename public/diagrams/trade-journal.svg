<text x="320" y="30" font-size="14" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">トレード日誌の改善ループ</text><rect x="52" y="60" width="130" height="100" rx="8" fill="#ffffff" stroke="#2b4a8b" stroke-width="2"/><text x="117" y="88" font-size="12.5" fill="#2b4a8b" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">① 記録する</text><text x="117" y="115" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">根拠・感情・結果を</text><text x="117" y="133" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">その場で書く</text><rect x="192" y="60" width="130" height="100" rx="8" fill="#ffffff" stroke="#1f6e50" stroke-width="2"/><text x="257" y="88" font-size="12.5" fill="#1f6e50" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">② 集計する</text><text x="257" y="115" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">勝率・損益比・</text><text x="257" y="133" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ルール順守率を数える</text><rect x="332" y="60" width="130" height="100" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><text x="397" y="88" font-size="12.5" fill="#a3690f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">③ 仮説を立てる</text><text x="397" y="115" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「負けの共通点は</text><text x="397" y="133" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">　◯◯では？」</text><rect x="472" y="60" width="130" height="100" rx="8" fill="#ffffff" stroke="#c73e2e" stroke-width="2"/><text x="537" y="88" font-size="12.5" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">④ ひとつ変える</text><text x="537" y="115" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">次の期間は</text><text x="537" y="133" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">1点だけ修正して検証</text><line x1="184" y1="110" x2="192" y2="110" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="192,110 183.8959760788259,113.91468980700107 183.8959760788259,106.08531019299893" fill="#57606e"/><line x1="324" y1="110" x2="332" y2="110" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="332,110 323.8959760788259,113.91468980700107 323.8959760788259,106.08531019299893" fill="#57606e"/><line x1="464" y1="110" x2="472" y2="110" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="472,110 463.8959760788259,113.91468980700107 463.8959760788259,106.08531019299893" fill="#57606e"/><polyline points="545,165 545,195 80,195 80,168" fill="none" stroke="#57606e" stroke-width="1.5" stroke-dasharray="5 4" stroke-linejoin="round" stroke-linecap="round"/><line x1="80" y1="175" x2="80" y2="163" stroke="#57606e" stroke-width="1.5"  stroke-linecap="round"/><polygon points="80,163 83.91468980700107,171.1040239211741 76.08531019299893,171.1040239211741" fill="#57606e"/><text x="320" y="215" font-size="12" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">感想文ではなく「数えられる記録」にするのがコツ（数字にできれば検証できる）</text>
</svg>