<text x="320" y="26" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">次の抵抗帯の「手前」を目標にする</text><line x1="60" y1="80" x2="580" y2="80" stroke="#0075c2" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round"/><text x="66" y="70" font-size="11.5" fill="#0075c2" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">過去の高値・戻り売りが待つ抵抗帯</text><polyline points="60,250 130,220 190,235 260,190 330,205 400,150 470,120" fill="none" stroke="#26313f" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><line x1="60" y1="100" x2="580" y2="100" stroke="#c73e2e" stroke-width="2"  stroke-linecap="round"/><text x="500" y="118" font-size="12" fill="#c73e2e" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">利確目標：抵抗帯の手前</text><circle cx="130" cy="220" r="7" fill="none" stroke="#c73e2e" stroke-width="2"/><text x="142" y="224" font-size="11.5" fill="#c73e2e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">買い</text><text x="320" y="292" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「みんなが売りたい場所」まで引っ張らず、その手前で先に降りる。欲との交換で約定確率を買う設計</text>
</svg>