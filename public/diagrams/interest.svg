<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" role="img">
<rect width="640" height="300" fill="#ffffff"/>
<line x1="0" y1="60" x2="640" y2="60" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="120" x2="640" y2="120" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="180" x2="640" y2="180" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="240" x2="640" y2="240" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<rect x="60" y="90" width="180" height="120" rx="8" fill="#e9f2fb" stroke="#dde3ec"/><text x="150" y="140" font-size="15" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">貸し手</text><text x="150" y="165" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（預金者・投資家）</text><rect x="400" y="90" width="180" height="120" rx="8" fill="#fff3e6" stroke="#dde3ec"/><text x="490" y="140" font-size="15" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">借り手</text><text x="490" y="165" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（企業・国・個人）</text><line x1="250" y1="115" x2="390" y2="115" stroke="#0075c2" stroke-width="2.5"  stroke-linecap="round"/><polygon points="390,115 381.8959760788259,118.91468980700107 381.8959760788259,111.08531019299893" fill="#0075c2"/><text x="320" y="105" font-size="12.5" fill="#0075c2" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">お金を貸す</text><line x1="390" y1="185" x2="250" y2="185" stroke="#c73e2e" stroke-width="2.5"  stroke-linecap="round"/><polygon points="250,185 258.1040239211741,181.08531019299892 258.1040239211741,188.91468980700108" fill="#c73e2e"/><text x="320" y="210" font-size="12.5" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">元本＋金利を返す</text><text x="320" y="255" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">金利＝お金を一定期間借りる「値段」。</text><text x="320" y="278" font-size="12" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">期間が長いほど・返ってこない不安（信用リスク）が大きいほど高くなるのが原則</text>
</svg>