<rect width="640" height="300" fill="#ffffff"/>
<line x1="0" y1="60" x2="640" y2="60" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="120" x2="640" y2="120" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="180" x2="640" y2="180" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="240" x2="640" y2="240" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="28" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ナスダック総合指数の軌跡（1995〜2002年・模式図）</text><polyline points="60,235 130,220 200,195 260,160 310,115 350,70 385,45 420,85 455,140 495,185 540,225 570,240" fill="none" stroke="#26313f" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><circle cx="385" cy="45" r="8" fill="none" stroke="#0075c2" stroke-width="2.2"/><text x="385" y="30" font-size="11.5" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">2000年3月 5,048（ピーク）</text><text x="180" y="150" font-size="11" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「社名に.comを付ければ株価が上がる」</text><text x="200" y="167" font-size="11" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">利益なき企業への熱狂</text><text x="470" y="250" font-size="11" fill="#0075c2" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ピークから約78%下落</text><text x="320" y="285" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ただしインターネット自体は本物だった——「技術の正しさ」と「価格の正しさ」は別問題</text>
</svg>