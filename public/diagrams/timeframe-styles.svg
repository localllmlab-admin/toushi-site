<text x="320" y="26" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">トレードスタイル比較：時間軸が変わると「別の競技」になる</text><rect x="38" y="52" width="136" height="185" rx="8" fill="#ffffff" stroke="#c73e2e" stroke-width="2"/><text x="106" y="76" font-size="12" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">スキャルピング</text><text x="48" y="100" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">保有：数秒〜数分</text><text x="48" y="119" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">足：1分・ティック</text><text x="48" y="138" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">回数：1日数十回</text><text x="48" y="157" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">生命線：執行コスト</text><text x="48" y="176" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">拘束：張り付き必須</text><text x="48" y="195" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">口座資金の回転：極大</text><rect x="188" y="52" width="136" height="185" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><text x="256" y="76" font-size="12" fill="#a3690f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">デイトレード</text><text x="198" y="100" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">保有：数分〜数時間</text><text x="198" y="119" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">足：1分〜15分＋日足</text><text x="198" y="138" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">回数：1日数回</text><text x="198" y="157" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">生命線：当日の規律</text><text x="198" y="176" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">拘束：市場時間中</text><text x="198" y="195" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">持ち越しリスク：なし</text><rect x="338" y="52" width="136" height="185" rx="8" fill="#ffffff" stroke="#1f6e50" stroke-width="2"/><text x="406" y="76" font-size="12" fill="#1f6e50" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">スイング</text><text x="348" y="100" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">保有：数日〜数週間</text><text x="348" y="119" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">足：1時間〜週足</text><text x="348" y="138" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">回数：月数回</text><text x="348" y="157" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">生命線：損切り位置</text><text x="348" y="176" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">拘束：小さい</text><text x="348" y="195" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">持ち越しリスク：あり</text><rect x="488" y="52" width="136" height="185" rx="8" fill="#ffffff" stroke="#0075c2" stroke-width="2"/><text x="556" y="76" font-size="12" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">長期投資</text><text x="498" y="100" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">保有：数年〜</text><text x="498" y="119" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">足：週足・月足</text><text x="498" y="138" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">回数：年数回</text><text x="498" y="157" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">生命線：配分と継続</text><text x="498" y="176" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">拘束：ごく小さい</text><text x="498" y="195" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">源泉：成長・複利</text><text x="320" y="262" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">右へ行くほど時間の拘束と取引コストは減り、1回の判断の重みと忍耐の比重が増える</text>
