<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 310" role="img">
<rect width="640" height="310" fill="#ffffff"/>
<line x1="0" y1="62" x2="640" y2="62" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="124" x2="640" y2="124" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="186" x2="640" y2="186" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="248" x2="640" y2="248" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="30" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">金利上昇が各市場へ波及する代表的な経路（教科書的な整理）</text><rect x="240" y="55" width="160" height="50" rx="8" fill="#26313f"/><text x="320" y="86" font-size="14" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">金利の上昇</text><line x1="250" y1="108" x2="140" y2="145" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="140,145 146.43309241798866,138.70592962053834 148.9291890731498,146.12675751426056" fill="#57606e"/><line x1="320" y1="108" x2="320" y2="145" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="320,145 316.0853101929989,136.8959760788259 323.9146898070011,136.8959760788259" fill="#57606e"/><line x1="390" y1="108" x2="500" y2="145" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="500,145 491.07081092685024,146.12675751426056 493.5669075820113,138.70592962053834" fill="#57606e"/><rect x="40" y="150" width="180" height="115" rx="8" fill="#ffffff" stroke="#2b4a8b" stroke-width="2"/><rect x="40" y="150" width="180" height="30" rx="8" fill="#2b4a8b"/><rect x="40" y="172" width="180" height="8" fill="#2b4a8b"/><text x="130" y="171" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">株式</text><text x="54" y="202" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">借入コスト増で企業収益に逆風</text><text x="54" y="222" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">将来利益の割引率が上がり</text><text x="54" y="242" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">特に成長株の評価が圧縮</text><text x="54" y="262" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">→ 下落要因とされる</text><rect x="230" y="150" width="180" height="115" rx="8" fill="#ffffff" stroke="#1f6e50" stroke-width="2"/><rect x="230" y="150" width="180" height="30" rx="8" fill="#1f6e50"/><rect x="230" y="172" width="180" height="8" fill="#1f6e50"/><text x="320" y="171" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">債券</text><text x="244" y="202" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">新発債の利回りが上がるほど</text><text x="244" y="222" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">既発債の魅力は低下</text><text x="244" y="242" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">→ 債券価格は下落</text><text x="244" y="262" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（金利と逆方向）</text><rect x="420" y="150" width="180" height="115" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><rect x="420" y="150" width="180" height="30" rx="8" fill="#a3690f"/><rect x="420" y="172" width="180" height="8" fill="#a3690f"/><text x="510" y="171" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">為替</text><text x="434" y="202" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">高金利通貨にお金が集まり</text><text x="434" y="222" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">その通貨高の要因に</text><text x="434" y="242" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（日米金利差と円相場の</text><text x="434" y="262" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">　関係が代表例）</text><text x="320" y="295" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">※常に成り立つ法則ではなく「金利がなぜ動いたか」で反応は変わる（景気過熱か・信用不安か）</text>
</svg>