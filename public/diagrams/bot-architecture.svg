<text x="320" y="30" font-size="14" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">自動売買botの一般的な構成要素</text><rect x="40" y="60" width="128" height="92" rx="8" fill="#ffffff" stroke="#2b4a8b" stroke-width="2"/><text x="104" y="86" font-size="12.5" fill="#2b4a8b" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">① データ取得</text><text x="104" y="110" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">価格・板・約定を</text><text x="104" y="128" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">APIで受信</text><line x1="170" y1="106" x2="186" y2="106" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="186,106 177.8959760788259,109.91468980700107 177.8959760788259,102.08531019299893" fill="#57606e"/><rect x="188" y="60" width="128" height="92" rx="8" fill="#ffffff" stroke="#1f6e50" stroke-width="2"/><text x="252" y="86" font-size="12.5" fill="#1f6e50" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">② シグナル判定</text><text x="252" y="110" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">戦略ロジックで</text><text x="252" y="128" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">売買条件を評価</text><line x1="318" y1="106" x2="334" y2="106" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="334,106 325.8959760788259,109.91468980700107 325.8959760788259,102.08531019299893" fill="#57606e"/><rect x="336" y="60" width="128" height="92" rx="8" fill="#ffffff" stroke="#c73e2e" stroke-width="2"/><text x="400" y="86" font-size="12.5" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">③ リスク管理</text><text x="400" y="110" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">数量・上限・</text><text x="400" y="128" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">損切りを強制</text><line x1="466" y1="106" x2="482" y2="106" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="482,106 473.8959760788259,109.91468980700107 473.8959760788259,102.08531019299893" fill="#57606e"/><rect x="484" y="60" width="128" height="92" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><text x="548" y="86" font-size="12.5" fill="#a3690f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">④ 発注・執行</text><text x="548" y="110" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">注文送信と</text><text x="548" y="128" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">約定確認・再送</text><rect x="40" y="175" width="560" height="50" rx="8" fill="#f7fafd" stroke="#dde3ec"/><text x="320" y="196" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">⑤ 監視・ログ・緊急停止（すべての層を横断）</text><text x="320" y="215" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">異常検知・通知・手動キルスイッチ。実運用では戦略ロジックより重要とされる層</text>
</svg>