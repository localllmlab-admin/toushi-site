<text x="320" y="24" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">SMAとEMA：同じ期間でも「反応の速さ」が違う</text><polyline points="60,220 120,218 180,215 240,210 280,140 340,110 400,95 460,85 540,75" fill="none" stroke="#26313f" stroke-width="2.2"  stroke-linejoin="round" stroke-linecap="round"/><text x="65" y="205" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">価格（急伸）</text><polyline points="60,235 120,234 180,232 240,228 280,195 340,160 400,135 460,118 540,103" fill="none" stroke="#c73e2e" stroke-width="2.2"  stroke-linejoin="round" stroke-linecap="round"/><text x="548" y="106" font-size="10.5" fill="#c73e2e" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">EMA</text><polyline points="60,240 120,239 180,238 240,236 280,220 340,195 400,172 460,150 540,130" fill="none" stroke="#0075c2" stroke-width="2.2"  stroke-linejoin="round" stroke-linecap="round"/><text x="548" y="134" font-size="10.5" fill="#0075c2" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">SMA</text><line x1="310" y1="250" x2="310" y2="180" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="310,180 313.9146898070011,188.1040239211741 306.0853101929989,188.1040239211741" fill="#57606e"/><text x="318" y="245" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">EMAは直近の価格を重く見るため追従が速い（その分だましも拾いやすい）</text><text x="320" y="290" font-size="10" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">SMA＝全期間を均等に平均／EMA＝直近を指数的に重視／WMA＝直近ほど大きな比重。速さと安定のトレードオフ（模式図）</text>
