<text x="320" y="26" font-size="13.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">実務家の損切りルールの代表例</text><polyline points="60,120 120,105 180,130 240,155 290,175" fill="none" stroke="#26313f" stroke-width="2"  stroke-linejoin="round" stroke-linecap="round"/><circle cx="120" cy="105" r="6" fill="none" stroke="#c73e2e" stroke-width="2"/><text x="132" y="100" font-size="11" fill="#c73e2e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">買値</text><line x1="60" y1="170" x2="290" y2="170" stroke="#0075c2" stroke-width="2" stroke-dasharray="5 3" stroke-linecap="round"/><text x="62" y="190" font-size="11" fill="#0075c2" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">買値の7〜8%下：例外なく売る</text><text x="175" y="230" font-size="11.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">オニールの機械的ルール</text><text x="175" y="248" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「例外を作らない」ことが本体</text><rect x="350" y="150" width="220" height="40" rx="4" fill="#0075c2" opacity="0.15"/><text x="460" y="175" font-size="11" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">1R＝損切りまでの距離（許容損失）</text><rect x="350" y="70" width="220" height="70" rx="4" fill="#c73e2e" opacity="0.12"/><text x="460" y="100" font-size="11" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">利益は 2R・3R… と</text><text x="460" y="118" font-size="11" fill="#c73e2e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">R（初期リスク）の倍数で測る</text><text x="460" y="230" font-size="11.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">タープのR倍数思考</text><text x="460" y="248" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">損切り距離が全取引の共通単位になる</text><line x1="320" y1="50" x2="320" y2="255" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
