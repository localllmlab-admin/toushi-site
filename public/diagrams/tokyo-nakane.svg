<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 290" role="img">
<rect width="640" height="290" fill="#ffffff"/>
<line x1="0" y1="58" x2="640" y2="58" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="116" x2="640" y2="116" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="174" x2="640" y2="174" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="232" x2="640" y2="232" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="24" font-size="12" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">東京仲値：午前9時55分頃のレートが「その日の社内基準」になる</text><line x1="60" y1="120" x2="580" y2="120" stroke="#26313f" stroke-width="2"  stroke-linecap="round"/><line x1="110" y1="112" x2="110" y2="128" stroke="#26313f" stroke-width="2"  stroke-linecap="round"/><text x="110" y="100" font-size="10.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">9:00</text><text x="110" y="145" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">東京市場の朝</text><line x1="300" y1="112" x2="300" y2="128" stroke="#c73e2e" stroke-width="2"  stroke-linecap="round"/><text x="300" y="100" font-size="10.5" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">9:55頃</text><text x="300" y="145" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">仲値の決定</text><line x1="470" y1="112" x2="470" y2="128" stroke="#26313f" stroke-width="2"  stroke-linecap="round"/><text x="470" y="100" font-size="10.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">10:00〜</text><text x="470" y="145" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">仲値公示・適用</text><rect x="210" y="160" width="220" height="66" rx="8" fill="#ffffff" stroke="#c73e2e" stroke-width="2"/><text x="320" y="182" font-size="12" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">仲値（TTM）</text><text x="320" y="200" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">銀行が対顧客取引の基準にする</text><text x="320" y="216" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">1日1回の社内レート</text><text x="320" y="252" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">輸入企業の決済などのドル需要が仲値の決定時刻の前に集中しやすく、</text><text x="320" y="270" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">特に5・10日（ゴトー日）は需要が偏りやすい――とされるのが「仲値の値動きの癖」の正体</text>
</svg>