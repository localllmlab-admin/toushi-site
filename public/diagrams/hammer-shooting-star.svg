<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 310" role="img">
<rect width="640" height="310" fill="#ffffff"/>
<line x1="0" y1="62" x2="640" y2="62" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="124" x2="640" y2="124" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="186" x2="640" y2="186" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="248" x2="640" y2="248" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<polyline points="40,60 75,100 110,140" fill="none" stroke="#57606e" stroke-width="1.5" stroke-dasharray="3 3" stroke-linejoin="round" stroke-linecap="round"/><line x1="145" y1="130" x2="145" y2="210" stroke="#0075c2" stroke-width="2"  stroke-linecap="round"/><rect x="135" y="130" width="20" height="15" rx="1.5" fill="#0075c2"/><text x="125" y="250" font-size="13" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">安値圏のカラカサ</text><text x="125" y="270" font-size="12" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">売りが出尽くし買い戻された形</text><text x="125" y="288" font-size="12" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">→ 底打ち候補（ハンマー）</text><polyline points="250,200 285,160 320,120" fill="none" stroke="#57606e" stroke-width="1.5" stroke-dasharray="3 3" stroke-linejoin="round" stroke-linecap="round"/><line x1="355" y1="60" x2="355" y2="150" stroke="#0075c2" stroke-width="2"  stroke-linecap="round"/><rect x="345" y="125" width="20" height="15" rx="1.5" fill="#0075c2"/><text x="335" y="250" font-size="13" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">高値圏のトンカチ</text><text x="335" y="270" font-size="12" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">上値で強く押し戻された形</text><text x="335" y="288" font-size="12" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">→ 天井候補（シューティングスター）</text><polyline points="460,200 495,160 530,120" fill="none" stroke="#57606e" stroke-width="1.5" stroke-dasharray="3 3" stroke-linejoin="round" stroke-linecap="round"/><line x1="565" y1="110" x2="565" y2="190" stroke="#0075c2" stroke-width="2"  stroke-linecap="round"/><rect x="555" y="110" width="20" height="15" rx="1.5" fill="#0075c2"/><text x="545" y="250" font-size="12.5" fill="#a3690f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">高値圏のカラカサ＝首吊り線</text><text x="545" y="270" font-size="12" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">同じ形でも位置で解釈が変わり</text><text x="545" y="288" font-size="12" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">警戒シグナルとされる</text><line x1="230" y1="40" x2="230" y2="295" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="445" y1="40" x2="445" y2="295" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
</svg>