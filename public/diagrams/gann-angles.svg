<text x="320" y="24" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ギャンアングル：起点から「時間×価格」の角度で線を引く</text><line x1="80" y1="260" x2="300" y2="60" stroke="#c73e2e" stroke-width="2"  stroke-linecap="round"/><text x="295" y="52" font-size="10" fill="#c73e2e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">2×1（急）</text><line x1="80" y1="260" x2="480" y2="70" stroke="#a3690f" stroke-width="2.5"  stroke-linecap="round"/><text x="490" y="68" font-size="10.5" fill="#a3690f" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">1×1（45度）</text><line x1="80" y1="260" x2="580" y2="160" stroke="#0075c2" stroke-width="2"  stroke-linecap="round"/><text x="555" y="178" font-size="10" fill="#0075c2" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">1×2（緩）</text><polyline points="80,260 140,215 190,235 260,170 320,195 400,130 460,150 540,100" fill="none" stroke="#26313f" stroke-width="2.2"  stroke-linejoin="round" stroke-linecap="round"/><text x="320" y="292" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">1×1線（時間1に対して価格1）の上なら強い相場、割れたら次の角度へ――という段階的な読み方をする（模式図）</text>
