<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 262" role="img">
<rect width="640" height="262" fill="#ffffff"/>
<line x1="0" y1="52.4" x2="640" y2="52.4" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="104.8" x2="640" y2="104.8" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="157.2" x2="640" y2="157.2" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="209.6" x2="640" y2="209.6" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="30" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">相場操縦の代表的な類型（いずれも金商法で禁止・刑事罰の対象）</text><rect x="40" y="58" width="180" height="155" rx="8" fill="#ffffff" stroke="#c73e2e" stroke-width="2"/><rect x="40" y="58" width="180" height="30" rx="8" fill="#c73e2e"/><rect x="40" y="80" width="180" height="8" fill="#c73e2e"/><text x="130" y="79" font-size="12.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">見せ玉（みせぎょく）</text><text x="54" y="110" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">約定させる意思のない</text><text x="54" y="130" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">大量の注文を板に見せ、</text><text x="54" y="150" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">厚い買い/売りがあると</text><text x="54" y="170" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">誤解させて誘い込む</text><rect x="230" y="58" width="180" height="155" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><rect x="230" y="58" width="180" height="30" rx="8" fill="#a3690f"/><rect x="230" y="80" width="180" height="8" fill="#a3690f"/><text x="320" y="79" font-size="12.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">仮装売買</text><text x="244" y="110" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">同一人物が自分自身と</text><text x="244" y="130" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">売買を成立させ、</text><text x="244" y="150" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">取引が活発だと</text><text x="244" y="170" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">見せかける</text><rect x="420" y="58" width="180" height="155" rx="8" fill="#ffffff" stroke="#6b4fa0" stroke-width="2"/><rect x="420" y="58" width="180" height="30" rx="8" fill="#6b4fa0"/><rect x="420" y="80" width="180" height="8" fill="#6b4fa0"/><text x="510" y="79" font-size="12.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">馴合（なれあい）売買</text><text x="434" y="110" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">複数人が示し合わせて</text><text x="434" y="130" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">売買を繰り返し、</text><text x="434" y="150" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">出来高や価格を</text><text x="434" y="170" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">人為的に演出する</text><text x="320" y="243" font-size="12" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">共通点: 「自然な需給で価格が決まっている」という市場への信頼を裏切る行為</text>
</svg>