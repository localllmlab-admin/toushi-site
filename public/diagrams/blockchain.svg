<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 250" role="img">
<rect width="640" height="250" fill="#ffffff"/>
<line x1="0" y1="50" x2="640" y2="50" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="100" x2="640" y2="100" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="150" x2="640" y2="150" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="200" x2="640" y2="200" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="30" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">取引記録を「ブロック」にまとめ、鎖のようにつないで皆で持ち合う台帳</text><rect x="90" y="70" width="130" height="80" rx="6" fill="#e9f2fb" stroke="#0075c2" stroke-width="2"/><text x="155" y="95" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ブロック 1</text><text x="155" y="115" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">取引記録の束</text><text x="155" y="133" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">＋前ブロックの指紋</text><line x1="222" y1="110" x2="258" y2="110" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="258,110 249.8959760788259,113.91468980700107 249.8959760788259,106.08531019299893" fill="#57606e"/><rect x="260" y="70" width="130" height="80" rx="6" fill="#e9f2fb" stroke="#0075c2" stroke-width="2"/><text x="325" y="95" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ブロック 2</text><text x="325" y="115" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">取引記録の束</text><text x="325" y="133" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">＋前ブロックの指紋</text><line x1="392" y1="110" x2="428" y2="110" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="428,110 419.8959760788259,113.91468980700107 419.8959760788259,106.08531019299893" fill="#57606e"/><rect x="430" y="70" width="130" height="80" rx="6" fill="#e9f2fb" stroke="#0075c2" stroke-width="2"/><text x="495" y="95" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ブロック 3</text><text x="495" y="115" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">取引記録の束</text><text x="495" y="133" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">＋前ブロックの指紋</text><text x="320" y="180" font-size="12" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">前のブロックの内容から作った「指紋（ハッシュ）」を次に埋め込むため、</text><text x="320" y="200" font-size="12.5" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">過去の改ざんは後続すべてと矛盾して発覚する</text><text x="320" y="232" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">さらに同じ台帳を多数の参加者が持ち合う（分散）ため、単独での書き換えが困難とされる</text>
</svg>