<text x="320" y="24" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">エリオット波動：推進5波と修正3波の基本形</text><polyline points="50,260 120,180 160,215 250,110 300,150 370,70" fill="none" stroke="#c73e2e" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><polyline points="370,70 420,130 460,100 520,175" fill="none" stroke="#0075c2" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><text x="120" y="168" font-size="12" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">1</text><text x="160" y="235" font-size="12" fill="#57606e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">2</text><text x="250" y="98" font-size="12" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">3</text><text x="300" y="170" font-size="12" fill="#57606e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">4</text><text x="370" y="58" font-size="12" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">5</text><text x="420" y="150" font-size="12" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">A</text><text x="460" y="88" font-size="12" fill="#57606e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">B</text><text x="520" y="195" font-size="12" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">C</text><text x="320" y="292" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">主なルール：2波は1波の起点を割らない／3波は最短にならない／4波は1波の高値と重ならない（模式図）</text>
