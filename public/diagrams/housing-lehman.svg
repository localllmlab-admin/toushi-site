<text x="320" y="28" font-size="13.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">米住宅バブル（〜2008年）の連鎖構造</text><rect x="80" y="52" width="480" height="44" rx="8" fill="#ffffff" stroke="#2b4a8b" stroke-width="2"/><text x="100" y="72" font-size="12.5" fill="#2b4a8b" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">住宅価格の上昇神話</text><text x="100" y="89" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「住宅価格は全国では下がらない」</text><line x1="320" y1="98" x2="320" y2="106" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="320,106 316.0853101929989,97.89597607882591 323.9146898070011,97.89597607882591" fill="#57606e"/><rect x="80" y="108" width="480" height="44" rx="8" fill="#ffffff" stroke="#1f6e50" stroke-width="2"/><text x="100" y="128" font-size="12.5" fill="#1f6e50" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">低所得者向けローン拡大</text><text x="100" y="145" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">サブプライムローン・審査の劣化</text><line x1="320" y1="154" x2="320" y2="162" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="320,162 316.0853101929989,153.8959760788259 323.9146898070011,153.8959760788259" fill="#57606e"/><rect x="80" y="164" width="480" height="44" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><text x="100" y="184" font-size="12.5" fill="#a3690f" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">証券化で世界に拡散</text><text x="100" y="201" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ローンを束ねた金融商品を世界の投資家が保有</text><line x1="320" y1="210" x2="320" y2="218" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="320,218 316.0853101929989,209.8959760788259 323.9146898070011,209.8959760788259" fill="#57606e"/><rect x="80" y="220" width="480" height="44" rx="8" fill="#ffffff" stroke="#c73e2e" stroke-width="2"/><text x="100" y="240" font-size="12.5" fill="#c73e2e" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">価格下落で連鎖崩壊</text><text x="100" y="257" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">2008年9月リーマン・ブラザーズ破綻→世界金融危機</text><text x="320" y="296" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">レバレッジと複雑な金融商品が、局所的な住宅バブルを世界的な危機に増幅した</text>
