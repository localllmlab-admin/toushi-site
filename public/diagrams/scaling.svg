<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 275" role="img">
<rect width="640" height="275" fill="#ffffff"/>
<line x1="0" y1="55" x2="640" y2="55" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="110" x2="640" y2="110" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="165" x2="640" y2="165" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="220" x2="640" y2="220" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="28" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">一括と分割 ― 同じ資金でも入り方で結果のブレが変わる</text><polyline points="50,100 110,140 170,120 230,170 280,150" fill="none" stroke="#26313f" stroke-width="2"  stroke-linejoin="round" stroke-linecap="round"/><circle cx="65" cy="110" r="8" fill="none" stroke="#0075c2" stroke-width="2.2"/><text x="80" y="95" font-size="12" fill="#0075c2" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">一括投入</text><text x="165" y="230" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">タイミングの当たり外れを</text><text x="165" y="248" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">1回の判断が全て背負う</text><polyline points="340,100 400,140 460,120 520,170 580,150" fill="none" stroke="#26313f" stroke-width="2"  stroke-linejoin="round" stroke-linecap="round"/><circle cx="350" cy="108" r="7" fill="none" stroke="#c73e2e" stroke-width="2"/><text x="350" y="94" font-size="10.5" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">1/3</text><circle cx="430" cy="132" r="7" fill="none" stroke="#c73e2e" stroke-width="2"/><text x="430" y="118" font-size="10.5" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">1/3</text><circle cx="520" cy="170" r="7" fill="none" stroke="#c73e2e" stroke-width="2"/><text x="520" y="156" font-size="10.5" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">1/3</text><text x="460" y="230" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">複数回に分けて平均化。</text><text x="460" y="248" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">有利にも不利にもなり得るが、ブレは小さくなる</text><line x1="320" y1="55" x2="320" y2="260" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
</svg>