<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" role="img">
<rect width="640" height="300" fill="#ffffff"/>
<line x1="0" y1="60" x2="640" y2="60" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="120" x2="640" y2="120" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="180" x2="640" y2="180" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="240" x2="640" y2="240" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<polyline points="50,150 110,130 170,145 230,138 290,150 350,142 410,152 470,145" fill="none" stroke="#26313f" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><circle cx="110" cy="130" r="7" fill="none" stroke="#c73e2e" stroke-width="2.2"/><text x="100" y="113" font-size="11.5" fill="#c73e2e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">買い：ブレイクの継続を想定</text><rect x="110" y="90" width="300" height="130" fill="#a3690f" opacity="0.08"/><line x1="410" y1="90" x2="410" y2="220" stroke="#a3690f" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round"/><text x="418" y="105" font-size="11.5" fill="#a3690f" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">想定期間（例：10営業日）</text><text x="418" y="123" font-size="11.5" fill="#a3690f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">が経過しても伸びない</text><text x="418" y="145" font-size="11.5" fill="#0075c2" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">→ シナリオ不発として撤退</text><text x="320" y="265" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">価格の損切りに掛からなくても「起きるはずのことが起きない」のはシナリオの否定。</text><text x="320" y="283" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">資金と注意力を無期限に拘束させないための時間の損切り</text>
</svg>