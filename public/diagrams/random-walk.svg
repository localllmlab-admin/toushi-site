<text x="320" y="24" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">どちらかがコイン投げ・どちらかが実際の相場（という思考実験）</text><rect x="40" y="50" width="260" height="180" rx="8" fill="#ffffff" stroke="#dde3ec" stroke-width="1.5"/><polyline points="55,160 75,145 95,155 115,130 135,142 155,120 175,132 195,110 215,125 235,105 255,118 275,98 288,108" fill="none" stroke="#26313f" stroke-width="2"  stroke-linejoin="round" stroke-linecap="round"/><text x="170" y="218" font-size="12" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">A</text><rect x="340" y="50" width="260" height="180" rx="8" fill="#ffffff" stroke="#dde3ec" stroke-width="1.5"/><polyline points="355,130 375,150 395,138 415,165 435,148 455,172 475,160 495,185 515,168 535,190 555,175 575,195 588,185" fill="none" stroke="#26313f" stroke-width="2"  stroke-linejoin="round" stroke-linecap="round"/><text x="470" y="218" font-size="12" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">B</text><text x="320" y="262" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">コイン投げの累積和のグラフには、トレンドや支持線・抵抗線「のようなもの」が自然に現れる。</text><text x="320" y="280" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">見た目だけでは区別しにくいことが、テクニカル分析への批判（ランダムウォーク仮説）の出発点になった</text>
</svg>