<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 315" role="img">
<rect width="640" height="315" fill="#ffffff"/>
<line x1="0" y1="63" x2="640" y2="63" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="126" x2="640" y2="126" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="189" x2="640" y2="189" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="252" x2="640" y2="252" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="26" font-size="13.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">相場サイクルと「バブルの格言」</text><polyline points="50,250 130,225 210,185 290,130 360,75 420,60 480,120 540,210 590,260" fill="none" stroke="#26313f" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><text x="120" y="205" font-size="10.5" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「強気相場は悲観の中で生まれ…」</text><text x="255" y="108" font-size="10.5" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「まだはもうなり」</text><text x="420" y="42" font-size="11" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「靴磨きの少年が株を語ったら売り」</text><text x="505" y="95" font-size="10.5" fill="#0075c2" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「音楽が止まっても</text><text x="505" y="110" font-size="10.5" fill="#0075c2" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">　踊り続けてしまう」</text><text x="545" y="245" font-size="10.5" fill="#57606e" text-anchor="end"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「今回は違う、は</text><text x="545" y="260" font-size="10.5" fill="#57606e" text-anchor="end"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">　最も高くつく言葉」</text><text x="320" y="300" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">格言は予測の道具ではなく、熱狂の中で自分の位置を疑うためのチェックリスト</text>
</svg>