<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 290" role="img">
<rect width="640" height="290" fill="#ffffff"/>
<line x1="0" y1="58" x2="640" y2="58" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="116" x2="640" y2="116" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="174" x2="640" y2="174" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="232" x2="640" y2="232" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="26" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">利益確定にまつわる格言と、その警告対象</text><rect x="45" y="55" width="260" height="100" rx="8" fill="#ffffff" stroke="#1f6e50" stroke-width="2"/><rect x="45" y="55" width="260" height="30" rx="8" fill="#1f6e50"/><rect x="45" y="77" width="260" height="8" fill="#1f6e50"/><text x="175" y="76" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「利食い千人力」</text><text x="59" y="107" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">確定した利益だけが本物の力。</text><text x="59" y="127" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">含み益への慢心と、</text><text x="59" y="147" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">利確をためらう欲への戒め</text><rect x="335" y="55" width="260" height="100" rx="8" fill="#ffffff" stroke="#2b4a8b" stroke-width="2"/><rect x="335" y="55" width="260" height="30" rx="8" fill="#2b4a8b"/><rect x="335" y="77" width="260" height="8" fill="#2b4a8b"/><text x="465" y="76" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「頭と尻尾はくれてやれ」</text><text x="349" y="107" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">天井で売ろうとするな。</text><text x="349" y="127" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">最高値への未練が</text><text x="349" y="147" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">往復（利益消滅）を招く</text><rect x="45" y="170" width="260" height="100" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><rect x="45" y="170" width="260" height="30" rx="8" fill="#a3690f"/><rect x="45" y="192" width="260" height="8" fill="#a3690f"/><text x="175" y="191" font-size="11.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「二度に買うべし二度に売るべし」</text><text x="59" y="222" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">一度に全部売買しない。</text><text x="59" y="242" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">分割による平均化の勧め</text><text x="59" y="262" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（分割利確の古典的表現）</text><rect x="335" y="170" width="260" height="100" rx="8" fill="#ffffff" stroke="#6b4fa0" stroke-width="2"/><rect x="335" y="170" width="260" height="30" rx="8" fill="#6b4fa0"/><rect x="335" y="192" width="260" height="8" fill="#6b4fa0"/><text x="465" y="191" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「売りは早かれ買いは遅かれ」</text><text x="349" y="222" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">出口は素早く、入口は慎重に。</text><text x="349" y="242" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">逃げ足の速さを</text><text x="349" y="262" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">美徳とする相場観</text>
</svg>