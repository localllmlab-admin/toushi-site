<line x1="80" y1="150" x2="80" y2="205" stroke="#0075c2" stroke-width="2"  stroke-linecap="round"/><rect x="70" y="155" width="20" height="40" rx="1.5" fill="#0075c2"/><line x1="130" y1="85" x2="130" y2="140" stroke="#0075c2" stroke-width="2"  stroke-linecap="round"/><rect x="120" y="90" width="20" height="40" rx="1.5" fill="#0075c2"/><rect x="60" y="132" width="95" height="21" rx="3" fill="#c73e2e" opacity="0.15"/><text x="105" y="230" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">窓（ギャップ）</text><text x="105" y="250" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">前日の高値と当日の安値の間に</text><text x="105" y="266" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">取引のない空間ができる</text><line x1="340" y1="187" x2="340" y2="238" stroke="#0075c2" stroke-width="2"  stroke-linecap="round"/><rect x="331" y="195" width="18" height="35" rx="1.5" fill="#0075c2"/><line x1="395" y1="142" x2="395" y2="193" stroke="#0075c2" stroke-width="2"  stroke-linecap="round"/><rect x="386" y="150" width="18" height="35" rx="1.5" fill="#0075c2"/><rect x="352" y="160" width="30" height="12" fill="#c73e2e" opacity="0.18"/><line x1="450" y1="97" x2="450" y2="148" stroke="#0075c2" stroke-width="2"  stroke-linecap="round"/><rect x="441" y="105" width="18" height="35" rx="1.5" fill="#0075c2"/><rect x="407" y="115" width="30" height="12" fill="#c73e2e" opacity="0.18"/><line x1="505" y1="52" x2="505" y2="103" stroke="#0075c2" stroke-width="2"  stroke-linecap="round"/><rect x="496" y="60" width="18" height="35" rx="1.5" fill="#0075c2"/><rect x="462" y="70" width="30" height="12" fill="#c73e2e" opacity="0.18"/><text x="425" y="230" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">三空（さんくう）</text><text x="425" y="250" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">窓を3つ開けて一方向に走った状態。</text><text x="425" y="266" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「三空叩き込みは買い向かえ」等、過熱の目安とされる</text><line x1="270" y1="40" x2="270" y2="275" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
</svg>