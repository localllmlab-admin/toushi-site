<rect width="640" height="265" fill="#ffffff"/>
<line x1="0" y1="53" x2="640" y2="53" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="106" x2="640" y2="106" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="159" x2="640" y2="159" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="212" x2="640" y2="212" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="24" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">トランプラリー（2016年）：期待の連鎖が急激な相場つきを作った</text><rect x="40" y="60" width="160" height="58" rx="8" fill="#ffffff" stroke="#6b4fa0" stroke-width="2"/><text x="120" y="84" font-size="11" fill="#6b4fa0" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">選挙結果の判明</text><text x="120" y="104" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">当初は急落（リスク回避）</text><line x1="200" y1="89" x2="240" y2="89" stroke="#57606e" stroke-width="2.5"  stroke-linecap="round"/><polygon points="240,89 231.8959760788259,92.91468980700107 231.8959760788259,85.08531019299893" fill="#57606e"/><rect x="242" y="60" width="160" height="58" rx="8" fill="#ffffff" stroke="#0075c2" stroke-width="2"/><text x="322" y="84" font-size="11" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">政策への期待</text><text x="322" y="104" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">減税・インフラ投資・規制緩和</text><line x1="402" y1="89" x2="442" y2="89" stroke="#57606e" stroke-width="2.5"  stroke-linecap="round"/><polygon points="442,89 433.8959760788259,92.91468980700107 433.8959760788259,85.08531019299893" fill="#57606e"/><rect x="444" y="60" width="160" height="58" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><text x="524" y="84" font-size="11" fill="#a3690f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">米金利の上昇</text><text x="524" y="104" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">財政拡張→インフレ期待</text><line x1="524" y1="118" x2="524" y2="152" stroke="#57606e" stroke-width="2.5"  stroke-linecap="round"/><polygon points="524,152 520.0853101929989,143.8959760788259 527.9146898070011,143.8959760788259" fill="#57606e"/><rect x="444" y="155" width="160" height="58" rx="8" fill="#ffffff" stroke="#c73e2e" stroke-width="2"/><text x="524" y="179" font-size="11" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ドル高・円安</text><text x="524" y="199" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">日米金利差の拡大</text><line x1="442" y1="184" x2="402" y2="184" stroke="#57606e" stroke-width="2.5"  stroke-linecap="round"/><polygon points="402,184 410.1040239211741,180.08531019299892 410.1040239211741,187.91468980700108" fill="#57606e"/><rect x="242" y="155" width="160" height="58" rx="8" fill="#ffffff" stroke="#c73e2e" stroke-width="2"/><text x="322" y="179" font-size="11" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">株高（日米とも）</text><text x="322" y="199" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">円安が日本株の追い風に</text><text x="140" y="190" font-size="10" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">※「期待」が先に価格を動かし、</text><text x="140" y="206" font-size="10" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">実現の検証は後から来る</text><text x="320" y="248" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">選挙当日の急落から一転、年末までドル高・株高が続いた。ただし期待主導の相場は期待の修正にも脆い</text>
</svg>