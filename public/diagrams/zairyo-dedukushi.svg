<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" role="img">
<rect width="640" height="300" fill="#ffffff"/>
<line x1="0" y1="60" x2="640" y2="60" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="120" x2="640" y2="120" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="180" x2="640" y2="180" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="240" x2="640" y2="240" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="24" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">材料出尽くし：「噂で買って事実で売る」の値動き構造</text><polyline points="60,240 120,215 180,190 240,150 300,110 340,80" fill="none" stroke="#c73e2e" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><polyline points="340,80 370,95 400,130 450,160 510,185 560,200" fill="none" stroke="#0075c2" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><line x1="340" y1="60" x2="340" y2="250" stroke="#a3690f" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round"/><text x="340" y="52" font-size="11" fill="#a3690f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">好材料の発表</text><text x="180" y="130" font-size="10.5" fill="#c73e2e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">期待で買われる局面</text><text x="180" y="146" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（観測報道・思惑）</text><text x="480" y="110" font-size="10.5" fill="#0075c2" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">発表を境に下落</text><text x="480" y="126" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">＝新たに買う人が残っていない</text><text x="320" y="285" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">価格は「事実そのもの」でなく「事実と織り込みの差」で動く。良い決算で下がる現象の多くはこの構造（模式図）</text>
</svg>