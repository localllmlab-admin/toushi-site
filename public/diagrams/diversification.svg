<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" role="img">
<rect width="640" height="300" fill="#ffffff"/>
<line x1="0" y1="60" x2="640" y2="60" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="120" x2="640" y2="120" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="180" x2="640" y2="180" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="240" x2="640" y2="240" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<polyline points="40,120 100,70 160,130 220,80 280,140 340,90 400,150 460,100 520,160 580,110" fill="none" stroke="#0075c2" stroke-width="2"  stroke-linejoin="round" stroke-linecap="round"/><polyline points="40,160 100,210 160,150 220,200 280,140 340,190 400,130 460,180 520,120 580,170" fill="none" stroke="#a3690f" stroke-width="2"  stroke-linejoin="round" stroke-linecap="round"/><polyline points="40,140 100,140 160,140 220,140 280,140 340,140 400,140 460,140 520,140 580,140" fill="none" stroke="#c73e2e" stroke-width="3.5"  stroke-linejoin="round" stroke-linecap="round"/><text x="50" y="55" font-size="12.5" fill="#0075c2" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">─ 資産A</text><text x="130" y="55" font-size="12.5" fill="#a3690f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">─ 資産B（Aと逆に動く）</text><text x="330" y="55" font-size="12.5" fill="#c73e2e" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">━ A+Bを半分ずつ持った場合</text><text x="320" y="250" font-size="12.5" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">値動きの異なる資産を組み合わせると、全体の変動（リスク）がならされる</text><text x="320" y="275" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">※完全に逆に動く資産は現実には稀。相関が低いほど効果が大きい、が一般的な整理</text>
</svg>