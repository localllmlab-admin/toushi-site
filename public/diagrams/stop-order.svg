<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 265" role="img">
<rect width="640" height="265" fill="#ffffff"/>
<line x1="0" y1="53" x2="640" y2="53" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="106" x2="640" y2="106" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="159" x2="640" y2="159" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="212" x2="640" y2="212" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="28" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">逆指値＝「不利な方向に動いたら」執行される予約注文</text><polyline points="60,150 140,130 220,145 300,125 380,140 460,165 540,185" fill="none" stroke="#26313f" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><line x1="60" y1="190" x2="560" y2="190" stroke="#0075c2" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round"/><text x="70" y="210" font-size="11.5" fill="#0075c2" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">売り逆指値（ここまで下がったら売る＝損切りの自動化）</text><line x1="60" y1="100" x2="560" y2="100" stroke="#c73e2e" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round"/><text x="70" y="90" font-size="11.5" fill="#c73e2e" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">買い逆指値（ここまで上がったら買う＝ブレイク追随）</text><text x="320" y="250" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">通常の指値が「有利な価格で」なのに対し、逆指値は「不利な方向への動きを条件に」執行される</text>
</svg>