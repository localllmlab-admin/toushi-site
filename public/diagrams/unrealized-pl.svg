<text x="320" y="28" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">含み損益＝決済していないポジションの評価上の損益</text><line x1="60" y1="150" x2="580" y2="150" stroke="#a3690f" stroke-width="2" stroke-dasharray="5 4" stroke-linecap="round"/><text x="66" y="142" font-size="11.5" fill="#a3690f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">買値</text><polyline points="100,150 170,120 240,135 310,100 380,130 450,170 520,190" fill="none" stroke="#26313f" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><rect x="100" y="100" width="320" height="50" fill="#c73e2e" opacity="0.08"/><rect x="420" y="150" width="140" height="45" fill="#0075c2" opacity="0.10"/><text x="260" y="92" font-size="11.5" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">含み益の期間</text><text x="500" y="212" font-size="11.5" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">含み損の期間</text><text x="320" y="255" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">決済して初めて損益は確定する。ただし「まだ損じゃない」は先送りの心理でもある（塩漬けの入口）</text>
