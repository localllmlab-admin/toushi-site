<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 278" role="img">
<rect width="640" height="278" fill="#ffffff"/>
<line x1="0" y1="55.6" x2="640" y2="55.6" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="111.2" x2="640" y2="111.2" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="166.8" x2="640" y2="166.8" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="222.4" x2="640" y2="222.4" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="28" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ヘッジ＝保有資産の値下がりリスクを打ち消す取引</text><polyline points="70,120 150,140 230,170 310,200" fill="none" stroke="#0075c2" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><text x="190" y="225" font-size="11.5" fill="#0075c2" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">保有株の下落（損失）</text><polyline points="330,200 410,170 490,140 570,120" fill="none" stroke="#c73e2e" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><text x="450" y="225" font-size="11.5" fill="#c73e2e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">先物の売り等の利益が相殺</text><rect x="240" y="70" width="160" height="36" rx="18" fill="#e9f2fb" stroke="#0075c2"/><text x="320" y="93" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">損益がならされる</text><text x="320" y="262" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">保険と同じで、コスト（ヘッジ費用）を払って不確実性を減らす。上昇の利益も削られる</text>
</svg>