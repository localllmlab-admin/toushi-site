<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" role="img">
<rect width="640" height="260" fill="#ffffff"/>
<line x1="0" y1="52" x2="640" y2="52" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="104" x2="640" y2="104" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="156" x2="640" y2="156" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="208" x2="640" y2="208" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="30" font-size="13.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">日本の暗号資産規制の大づかみな地図</text><rect x="40" y="58" width="180" height="150" rx="8" fill="#ffffff" stroke="#2b4a8b" stroke-width="2"/><rect x="40" y="58" width="180" height="30" rx="8" fill="#2b4a8b"/><rect x="40" y="80" width="180" height="8" fill="#2b4a8b"/><text x="130" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">資金決済法</text><text x="54" y="110" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">暗号資産の定義</text><text x="54" y="130" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">交換業者は登録制</text><text x="54" y="150" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">利用者財産の分別管理</text><text x="54" y="170" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">広告・勧誘規制</text><rect x="230" y="58" width="180" height="150" rx="8" fill="#ffffff" stroke="#1f6e50" stroke-width="2"/><rect x="230" y="58" width="180" height="30" rx="8" fill="#1f6e50"/><rect x="230" y="80" width="180" height="8" fill="#1f6e50"/><text x="320" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">金融商品取引法</text><text x="244" y="110" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">暗号資産デリバティブ</text><text x="244" y="130" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（証拠金取引）の規制</text><text x="244" y="150" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">不公正な行為の禁止</text><text x="244" y="170" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">レバレッジ上限2倍</text><rect x="420" y="58" width="180" height="150" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><rect x="420" y="58" width="180" height="30" rx="8" fill="#a3690f"/><rect x="420" y="80" width="180" height="8" fill="#a3690f"/><text x="510" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">税制（所得税法）</text><text x="434" y="110" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">個人の売買益は</text><text x="434" y="130" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">原則「雑所得」で</text><text x="434" y="150" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">総合課税</text><text x="434" y="170" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（給与等と合算・累進）</text><text x="320" y="240" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">無登録業者・海外業者の勧誘には金融庁が繰り返し警告。登録の有無は金融庁サイトで確認できる</text>
</svg>