<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 250" role="img">
<rect width="640" height="250" fill="#ffffff"/>
<line x1="0" y1="50" x2="640" y2="50" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="100" x2="640" y2="100" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="150" x2="640" y2="150" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="200" x2="640" y2="200" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="30" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ステルスマーケティング規制（2023年10月〜・景品表示法）</text><rect x="45" y="58" width="260" height="140" rx="8" fill="#fdecea" stroke="#c73e2e" stroke-width="2"/><text x="175" y="83" font-size="13" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">✕ 規制対象</text><text x="175" y="108" font-size="12" fill="#26313f" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">広告なのに広告と</text><text x="175" y="130" font-size="12" fill="#26313f" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">分からない表示</text><text x="175" y="152" font-size="12" fill="#26313f" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（事業者が依頼した投稿を</text><text x="175" y="174" font-size="12" fill="#26313f" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">　感想のように見せる等）</text><rect x="335" y="58" width="260" height="140" rx="8" fill="#e8f6ec" stroke="#1d7a3e" stroke-width="2"/><text x="465" y="83" font-size="13" fill="#1d7a3e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">○ 求められる対応</text><text x="465" y="108" font-size="12" fill="#26313f" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「広告」「PR」等の</text><text x="465" y="130" font-size="12" fill="#26313f" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">明確な表示</text><text x="465" y="152" font-size="12" fill="#26313f" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（投資情報の発信でも</text><text x="465" y="174" font-size="12" fill="#26313f" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">　報酬関係の明示が必要）</text><text x="320" y="228" font-size="12" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">投資系SNS・動画の「案件」投稿は規制対象。PR表記のない称賛は疑って読むのが自衛策</text>
