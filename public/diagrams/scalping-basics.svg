<text x="320" y="26" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">スキャルピング：極小の値幅を高頻度で積み上げる</text><polyline points="60,170 95,150 125,160 160,135 190,148 225,120 255,133 290,110 320,125 355,100 385,115 420,95" fill="none" stroke="#26313f" stroke-width="2"  stroke-linejoin="round" stroke-linecap="round"/><line x1="95" y1="190" x2="95" y2="155" stroke="#c73e2e" stroke-width="2"  stroke-linecap="round"/><polygon points="95,155 98.91468980700107,163.1040239211741 91.08531019299893,163.1040239211741" fill="#c73e2e"/><text x="95" y="205" font-size="10.5" fill="#c73e2e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">入</text><line x1="160" y1="100" x2="160" y2="130" stroke="#0075c2" stroke-width="2"  stroke-linecap="round"/><polygon points="160,130 156.08531019299892,121.89597607882591 163.91468980700108,121.89597607882591" fill="#0075c2"/><text x="160" y="92" font-size="10.5" fill="#0075c2" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">出</text><line x1="225" y1="155" x2="225" y2="125" stroke="#c73e2e" stroke-width="2"  stroke-linecap="round"/><polygon points="225,125 228.91468980700108,133.1040239211741 221.08531019299892,133.1040239211741" fill="#c73e2e"/><text x="225" y="170" font-size="10.5" fill="#c73e2e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">入</text><line x1="290" y1="75" x2="290" y2="105" stroke="#0075c2" stroke-width="2"  stroke-linecap="round"/><polygon points="290,105 286.0853101929989,96.89597607882591 293.9146898070011,96.89597607882591" fill="#0075c2"/><text x="290" y="67" font-size="10.5" fill="#0075c2" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">出</text><text x="240" y="235" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">保有時間：数秒〜数分 ／ 1回の狙い幅：ごく小さい ／ 取引回数：多い</text><rect x="450" y="60" width="160" height="150" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><text x="530" y="84" font-size="12" fill="#a3690f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">コストの壁</text><text x="462" y="108" font-size="10.5" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">狙う値幅が小さいほど</text><text x="462" y="126" font-size="10.5" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">スプレッド・手数料の</text><text x="462" y="144" font-size="10.5" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">比率が大きくなる</text><text x="462" y="172" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">例：狙い幅の2割が</text><text x="462" y="190" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">コストなら期待値は激減</text><text x="320" y="262" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">利益の源泉が小さいぶん、執行コストと約定品質が成否を直接左右する</text>
</svg>