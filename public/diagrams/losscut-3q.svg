<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 250" role="img">
<rect width="640" height="250" fill="#ffffff"/>
<line x1="0" y1="50" x2="640" y2="50" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="100" x2="640" y2="100" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="150" x2="640" y2="150" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="200" x2="640" y2="200" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="30" font-size="14" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">損切りの設計は3つの問いに分解できる</text><rect x="40" y="58" width="180" height="140" rx="8" fill="#ffffff" stroke="#2b4a8b" stroke-width="2"/><rect x="40" y="58" width="180" height="30" rx="8" fill="#2b4a8b"/><rect x="40" y="80" width="180" height="8" fill="#2b4a8b"/><text x="130" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">① なぜ切るのか</text><text x="54" y="110" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">買った理由（シナリオ）が</text><text x="54" y="130" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">崩れたと判定できる場所</text><text x="54" y="150" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">だから切る。</text><text x="54" y="170" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">価格の痛みではなく</text><text x="54" y="190" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">根拠の消滅で切る</text><rect x="230" y="58" width="180" height="140" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><rect x="230" y="58" width="180" height="30" rx="8" fill="#a3690f"/><rect x="230" y="80" width="180" height="8" fill="#a3690f"/><text x="320" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">② どこで切るのか</text><text x="244" y="110" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">テクニカル基準</text><text x="244" y="130" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（構造が壊れる場所）</text><text x="244" y="150" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">×ボラティリティ基準</text><text x="244" y="170" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（ノイズの外側）</text><text x="244" y="190" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">×資金基準（2%以内）</text><rect x="420" y="58" width="180" height="140" rx="8" fill="#ffffff" stroke="#c73e2e" stroke-width="2"/><rect x="420" y="58" width="180" height="30" rx="8" fill="#c73e2e"/><rect x="420" y="80" width="180" height="8" fill="#c73e2e"/><text x="510" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">③ どう実行するか</text><text x="434" y="110" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">エントリーと同時に</text><text x="434" y="130" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">逆指値を置く。</text><text x="434" y="150" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">その場の判断を</text><text x="434" y="170" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">残さないのが</text><text x="434" y="190" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">唯一の心理対策</text><text x="320" y="232" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">3つの答えがエントリー前に揃っていない売買は、サイズ・期待値・心理のすべてが未設計</text>
</svg>