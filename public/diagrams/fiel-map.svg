<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" role="img">
<rect width="640" height="260" fill="#ffffff"/>
<line x1="0" y1="52" x2="640" y2="52" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="104" x2="640" y2="104" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="156" x2="640" y2="156" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="208" x2="640" y2="208" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="30" font-size="13.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">金融商品取引法が規制する3つの領域（大づかみの地図）</text><rect x="40" y="58" width="180" height="150" rx="8" fill="#ffffff" stroke="#2b4a8b" stroke-width="2"/><rect x="40" y="58" width="180" height="30" rx="8" fill="#2b4a8b"/><rect x="40" y="80" width="180" height="8" fill="#2b4a8b"/><text x="130" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">業者への規制</text><text x="54" y="110" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">登録制・行為規制</text><text x="54" y="130" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（勧誘ルール・</text><text x="54" y="150" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">　断定的判断の禁止・</text><text x="54" y="170" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">　適合性の原則など）</text><rect x="230" y="58" width="180" height="150" rx="8" fill="#ffffff" stroke="#1f6e50" stroke-width="2"/><rect x="230" y="58" width="180" height="30" rx="8" fill="#1f6e50"/><rect x="230" y="80" width="180" height="8" fill="#1f6e50"/><text x="320" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">情報開示の規制</text><text x="244" y="110" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">有価証券報告書などの</text><text x="244" y="130" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">開示義務</text><text x="244" y="150" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（投資判断の材料を</text><text x="244" y="170" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">　公平に提供させる）</text><rect x="420" y="58" width="180" height="150" rx="8" fill="#ffffff" stroke="#c73e2e" stroke-width="2"/><rect x="420" y="58" width="180" height="30" rx="8" fill="#c73e2e"/><rect x="420" y="80" width="180" height="8" fill="#c73e2e"/><text x="510" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">不公正取引の規制</text><text x="434" y="110" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">インサイダー取引</text><text x="434" y="130" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">相場操縦</text><text x="434" y="150" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">風説の流布 など</text><text x="434" y="170" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（違反には刑事罰も）</text><text x="320" y="240" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">目的: 投資者の保護と、市場の公正性・透明性の確保（金商法1条）</text>
</svg>