<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 252" role="img">
<rect width="640" height="252" fill="#ffffff"/>
<line x1="0" y1="50.4" x2="640" y2="50.4" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="100.8" x2="640" y2="100.8" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="151.2" x2="640" y2="151.2" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="201.6" x2="640" y2="201.6" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="30" font-size="14" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">株価を測る3つの基本指標</text><rect x="40" y="58" width="180" height="145" rx="8" fill="#ffffff" stroke="#2b4a8b" stroke-width="2"/><rect x="40" y="58" width="180" height="30" rx="8" fill="#2b4a8b"/><rect x="40" y="80" width="180" height="8" fill="#2b4a8b"/><text x="130" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">PER（倍）</text><text x="54" y="110" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">株価 ÷ 1株あたり利益</text><text x="54" y="130" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif"></text><text x="54" y="150" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「利益の何年分の</text><text x="54" y="170" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">　値段が付いているか」</text><rect x="230" y="58" width="180" height="145" rx="8" fill="#ffffff" stroke="#1f6e50" stroke-width="2"/><rect x="230" y="58" width="180" height="30" rx="8" fill="#1f6e50"/><rect x="230" y="80" width="180" height="8" fill="#1f6e50"/><text x="320" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">PBR（倍）</text><text x="244" y="110" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">株価 ÷ 1株あたり純資産</text><text x="244" y="130" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif"></text><text x="244" y="150" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「会社の帳簿上の価値の</text><text x="244" y="170" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">　何倍で買われているか」</text><rect x="420" y="58" width="180" height="145" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><rect x="420" y="58" width="180" height="30" rx="8" fill="#a3690f"/><rect x="420" y="80" width="180" height="8" fill="#a3690f"/><text x="510" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">配当利回り（%）</text><text x="434" y="110" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">年間配当 ÷ 株価</text><text x="434" y="130" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif"></text><text x="434" y="150" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「株価に対して年何%の</text><text x="434" y="170" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">　配当を受け取れるか」</text><text x="320" y="232" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">いずれも「割安/割高」の単独の答えにはならない。業種・成長性・時期との比較で初めて意味を持つ</text>
</svg>