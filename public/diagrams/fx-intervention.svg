<text x="320" y="24" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">円買い介入の仕組み：決定は財務省、実行は日本銀行</text><rect x="60" y="50" width="200" height="66" rx="8" fill="#ffffff" stroke="#0075c2" stroke-width="2"/><text x="160" y="74" font-size="12" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">財務省（財務大臣）</text><text x="160" y="94" font-size="10" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">介入の実施を判断・指示</text><line x1="260" y1="83" x2="370" y2="83" stroke="#57606e" stroke-width="2.5"  stroke-linecap="round"/><polygon points="370,83 361.8959760788259,86.91468980700107 361.8959760788259,79.08531019299893" fill="#57606e"/><text x="315" y="72" font-size="10" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">指示</text><rect x="380" y="50" width="200" height="66" rx="8" fill="#ffffff" stroke="#c73e2e" stroke-width="2"/><text x="480" y="74" font-size="12" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">日本銀行</text><text x="480" y="94" font-size="10" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">国の代理人として市場で執行</text><line x1="480" y1="116" x2="480" y2="152" stroke="#c73e2e" stroke-width="2.5"  stroke-linecap="round"/><polygon points="480,152 476.0853101929989,143.8959760788259 483.9146898070011,143.8959760788259" fill="#c73e2e"/><rect x="330" y="154" width="300" height="60" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><text x="480" y="176" font-size="11.5" fill="#a3690f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">外国為替市場でドル売り・円買い</text><text x="480" y="196" font-size="9" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">原資＝外貨準備（円売り介入なら政府短期証券で円を調達）</text><rect x="40" y="140" width="250" height="100" rx="8" fill="#ffffff" stroke="#26313f" stroke-width="2"/><rect x="40" y="140" width="250" height="30" rx="8" fill="#26313f"/><rect x="40" y="162" width="250" height="8" fill="#26313f"/><text x="165" y="161" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">介入の3つの型</text><text x="54" y="192" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">単独介入：日本だけで実施</text><text x="54" y="212" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">協調介入：複数の通貨当局が同時に</text><text x="54" y="232" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">覆面介入：実施を公表せずに行う</text><text x="320" y="268" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">実績は財務省が「外国為替平衡操作の実施状況」として月次・四半期で公表する</text>
</svg>