<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 240" role="img">
<rect width="640" height="240" fill="#ffffff"/>
<line x1="0" y1="48" x2="640" y2="48" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="96" x2="640" y2="96" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="144" x2="640" y2="144" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="192" x2="640" y2="192" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="30" font-size="13.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">FX＝証拠金を担保に、その何倍もの外貨を売買する取引</text><rect x="70" y="70" width="120" height="70" rx="6" fill="#e9f2fb" stroke="#0075c2" stroke-width="2"/><text x="130" y="100" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">証拠金</text><text x="130" y="122" font-size="14" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">10万円</text><line x1="200" y1="105" x2="300" y2="105" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="300,105 291.8959760788259,108.91468980700107 291.8959760788259,101.08531019299893" fill="#57606e"/><text x="250" y="92" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">最大25倍</text><rect x="310" y="55" width="260" height="100" rx="6" fill="#fff3e6" stroke="#f3d6b3" stroke-width="2"/><text x="440" y="90" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">取引できる金額</text><text x="440" y="118" font-size="15" fill="#b05a12" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">最大250万円分</text><text x="440" y="140" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（国内個人の上限は25倍）</text><text x="320" y="195" font-size="12.5" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">利益も損失も「取引金額」に対して発生 → 証拠金に対する損益の振れは25倍</text><text x="320" y="220" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">損失が膨らむと強制決済（ロスカット）。急変時は証拠金以上の損失が生じることもある</text>
</svg>