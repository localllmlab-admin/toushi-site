<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 290" role="img">
<rect width="640" height="290" fill="#ffffff"/>
<line x1="0" y1="58" x2="640" y2="58" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="116" x2="640" y2="116" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="174" x2="640" y2="174" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="232" x2="640" y2="232" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="26" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">損切り貧乏：ノイズの内側に置かれたストップが連続ヒットする</text><polyline points="50,180 90,140 130,175 170,130 210,170 250,120 290,160 330,110 370,150 410,95 450,130 490,80 540,60" fill="none" stroke="#26313f" stroke-width="2"  stroke-linejoin="round" stroke-linecap="round"/><circle cx="90" cy="140" r="5" fill="none" stroke="#c73e2e" stroke-width="1.8"/><line x1="75" y1="178" x2="145" y2="178" stroke="#0075c2" stroke-width="1.5" stroke-dasharray="3 2" stroke-linecap="round"/><circle cx="130" cy="178" r="5" fill="#0075c2"/><circle cx="170" cy="130" r="5" fill="none" stroke="#c73e2e" stroke-width="1.8"/><line x1="155" y1="172" x2="225" y2="172" stroke="#0075c2" stroke-width="1.5" stroke-dasharray="3 2" stroke-linecap="round"/><circle cx="210" cy="172" r="5" fill="#0075c2"/><circle cx="250" cy="120" r="5" fill="none" stroke="#c73e2e" stroke-width="1.8"/><line x1="235" y1="162" x2="305" y2="162" stroke="#0075c2" stroke-width="1.5" stroke-dasharray="3 2" stroke-linecap="round"/><circle cx="290" cy="162" r="5" fill="#0075c2"/><text x="180" y="220" font-size="11.5" fill="#0075c2" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">買い→浅いストップ→ヒット、を3連発</text><text x="180" y="238" font-size="11.5" fill="#0075c2" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">方向は正しかったのに損失だけ積み上がる</text><text x="440" y="45" font-size="11.5" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">相場は結局上昇</text><text x="320" y="275" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">原因は「損切りが早い」ことではなく「エントリーとストップの設計が銘柄の呼吸と合っていない」こと</text>
</svg>