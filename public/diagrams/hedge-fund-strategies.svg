<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" role="img">
<rect width="640" height="300" fill="#ffffff"/>
<line x1="0" y1="60" x2="640" y2="60" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="120" x2="640" y2="120" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="180" x2="640" y2="180" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="240" x2="640" y2="240" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="24" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ヘッジファンドの代表的な戦略</text><rect x="35" y="48" width="275" height="100" rx="8" fill="#ffffff" stroke="#0075c2" stroke-width="2"/><rect x="35" y="48" width="275" height="30" rx="8" fill="#0075c2"/><rect x="35" y="70" width="275" height="8" fill="#0075c2"/><text x="172.5" y="69" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">株式ロング・ショート</text><text x="49" y="100" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">割安を買い・割高を売る</text><text x="49" y="120" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">市場全体の方向への</text><text x="49" y="140" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">依存を減らす王道型</text><rect x="330" y="48" width="275" height="100" rx="8" fill="#ffffff" stroke="#6b4fa0" stroke-width="2"/><rect x="330" y="48" width="275" height="30" rx="8" fill="#6b4fa0"/><rect x="330" y="70" width="275" height="8" fill="#6b4fa0"/><text x="467.5" y="69" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">グローバルマクロ</text><text x="344" y="100" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">金利・為替・商品まで</text><text x="344" y="120" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">マクロ経済の歪みに</text><text x="344" y="140" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">大きな方向で賭ける</text><rect x="35" y="162" width="275" height="100" rx="8" fill="#ffffff" stroke="#1f6e50" stroke-width="2"/><rect x="35" y="162" width="275" height="30" rx="8" fill="#1f6e50"/><rect x="35" y="184" width="275" height="8" fill="#1f6e50"/><text x="172.5" y="183" font-size="11.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">マネージドフューチャーズ（CTA）</text><text x="49" y="214" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">先物のトレンドを</text><text x="49" y="234" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">システムで追随</text><text x="49" y="254" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">上げでも下げでも追う</text><rect x="330" y="162" width="275" height="100" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><rect x="330" y="162" width="275" height="30" rx="8" fill="#a3690f"/><rect x="330" y="184" width="275" height="8" fill="#a3690f"/><text x="467.5" y="183" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">アービトラージ系</text><text x="344" y="214" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">価格の歪みの収束を取る</text><text x="344" y="234" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">薄い利益×レバレッジ</text><text x="344" y="254" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">＝平時は安定・危機に脆い</text><text x="320" y="287" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">共通項は「空売り・レバレッジ・成功報酬」。市場平均に勝つことではなく絶対収益を狙う建て付け</text>
</svg>