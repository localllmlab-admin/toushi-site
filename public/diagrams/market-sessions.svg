<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 275" role="img">
<rect width="640" height="275" fill="#ffffff"/>
<line x1="0" y1="55" x2="640" y2="55" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="110" x2="640" y2="110" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="165" x2="640" y2="165" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="220" x2="640" y2="220" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="24" font-size="12" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">為替市場の24時間：3つの主要市場が主役を交代しながら回る</text><line x1="60" y1="210" x2="580" y2="210" stroke="#26313f" stroke-width="1.5"  stroke-linecap="round"/><line x1="60" y1="206" x2="60" y2="214" stroke="#26313f" stroke-width="1"  stroke-linecap="round"/><text x="60" y="230" font-size="9" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">0時</text><line x1="125" y1="206" x2="125" y2="214" stroke="#26313f" stroke-width="1"  stroke-linecap="round"/><text x="125" y="230" font-size="9" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">3時</text><line x1="190" y1="206" x2="190" y2="214" stroke="#26313f" stroke-width="1"  stroke-linecap="round"/><text x="190" y="230" font-size="9" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">6時</text><line x1="255" y1="206" x2="255" y2="214" stroke="#26313f" stroke-width="1"  stroke-linecap="round"/><text x="255" y="230" font-size="9" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">9時</text><line x1="320" y1="206" x2="320" y2="214" stroke="#26313f" stroke-width="1"  stroke-linecap="round"/><text x="320" y="230" font-size="9" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">12時</text><line x1="385" y1="206" x2="385" y2="214" stroke="#26313f" stroke-width="1"  stroke-linecap="round"/><text x="385" y="230" font-size="9" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">15時</text><line x1="450" y1="206" x2="450" y2="214" stroke="#26313f" stroke-width="1"  stroke-linecap="round"/><text x="450" y="230" font-size="9" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">18時</text><line x1="515" y1="206" x2="515" y2="214" stroke="#26313f" stroke-width="1"  stroke-linecap="round"/><text x="515" y="230" font-size="9" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">21時</text><line x1="580" y1="206" x2="580" y2="214" stroke="#26313f" stroke-width="1"  stroke-linecap="round"/><text x="580" y="230" font-size="9" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">24時</text><rect x="255" y="55" width="173.33333333333337" height="30" rx="4" fill="#0075c2" opacity="0.75"/><text x="341.6666666666667" y="75" font-size="10.5" fill="#ffffff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">東京時間（9〜17時頃）</text><rect x="406.66666666666663" y="100" width="173.33333333333337" height="30" rx="4" fill="#1f6e50" opacity="0.75"/><text x="493.3333333333333" y="120" font-size="10.5" fill="#ffffff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ロンドン時間（16時頃〜）</text><rect x="515" y="145" width="65" height="30" rx="4" fill="#c73e2e" opacity="0.75"/><text x="547.5" y="165" font-size="10.5" fill="#ffffff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">NY時間（21時頃〜）</text><rect x="60" y="145" width="130" height="30" rx="4" fill="#c73e2e" opacity="0.75"/><text x="125" y="165" font-size="10.5" fill="#ffffff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（〜翌6時頃）</text><rect x="515" y="95" width="65" height="85" fill="#a3690f" opacity="0.15"/><text x="547.5" y="88" font-size="9.5" fill="#a3690f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">重複帯＝最も取引が厚い</text><text x="320" y="258" font-size="10" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">時刻は日本時間・夏時間のおおよその目安（冬時間は約1時間後ろへ）。市場は途切れず、主役と値動きの性格が入れ替わる</text>
</svg>