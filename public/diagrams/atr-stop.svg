<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 265" role="img">
<rect width="640" height="265" fill="#ffffff"/>
<line x1="0" y1="53" x2="640" y2="53" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="106" x2="640" y2="106" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="159" x2="640" y2="159" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="212" x2="640" y2="212" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="26" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">同じ「3%の逆行」でも、銘柄の呼吸の大きさで意味が違う</text><polyline points="50,130 90,125 130,132 170,126 210,133 250,127 290,131" fill="none" stroke="#26313f" stroke-width="2"  stroke-linejoin="round" stroke-linecap="round"/><line x1="50" y1="155" x2="290" y2="155" stroke="#0075c2" stroke-width="1.5" stroke-dasharray="5 3" stroke-linecap="round"/><text x="170" y="190" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">日々の振れ幅(ATR)が1%の銘柄</text><text x="170" y="208" font-size="11" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">→ 3%逆行は明確な異常＝有効な損切り</text><polyline points="340,145 380,100 420,150 460,95 500,155 540,105 580,140" fill="none" stroke="#26313f" stroke-width="2"  stroke-linejoin="round" stroke-linecap="round"/><line x1="340" y1="170" x2="580" y2="170" stroke="#0075c2" stroke-width="1.5" stroke-dasharray="5 3" stroke-linecap="round"/><text x="460" y="190" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">日々の振れ幅(ATR)が4%の銘柄</text><text x="460" y="208" font-size="10.5" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">→ 3%逆行はただのノイズ＝即ヒットして損切り貧乏</text><line x1="320" y1="50" x2="320" y2="215" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><text x="320" y="250" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">損切り幅は固定%ではなく、その銘柄の平均的な振れ幅（ATR）の倍数で決めるのがボラ基準</text>
</svg>