<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 245" role="img">
<rect width="640" height="245" fill="#ffffff"/>
<line x1="0" y1="49" x2="640" y2="49" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="98" x2="640" y2="98" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="147" x2="640" y2="147" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="196" x2="640" y2="196" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="30" font-size="13.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">AI・機械学習が相場予測で直面する3つの壁</text><rect x="40" y="58" width="180" height="135" rx="8" fill="#ffffff" stroke="#2b4a8b" stroke-width="2"/><rect x="40" y="58" width="180" height="30" rx="8" fill="#2b4a8b"/><rect x="40" y="80" width="180" height="8" fill="#2b4a8b"/><text x="130" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ノイズの多さ</text><text x="54" y="110" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">価格変動の大半は</text><text x="54" y="130" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">偶然のゆらぎ。</text><text x="54" y="150" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">学習対象の「正解」が</text><text x="54" y="170" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">そもそも薄い</text><rect x="230" y="58" width="180" height="135" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><rect x="230" y="58" width="180" height="30" rx="8" fill="#a3690f"/><rect x="230" y="80" width="180" height="8" fill="#a3690f"/><text x="320" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">非定常性</text><text x="244" y="110" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">市場の性質そのものが</text><text x="244" y="130" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">時間とともに変わる。</text><text x="244" y="150" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">過去に学んだ規則性が</text><text x="244" y="170" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">将来も続く保証がない</text><rect x="420" y="58" width="180" height="135" rx="8" fill="#ffffff" stroke="#c73e2e" stroke-width="2"/><rect x="420" y="58" width="180" height="30" rx="8" fill="#c73e2e"/><rect x="420" y="80" width="180" height="8" fill="#c73e2e"/><text x="510" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">反射性</text><text x="434" y="110" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">有効な予測は使われる</text><text x="434" y="130" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ことで市場を動かし、</text><text x="434" y="150" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">その有効性自体が</text><text x="434" y="170" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">消えていく</text><text x="320" y="225" font-size="12" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">画像認識のような「答えが固定された問題」と、相場という「答えが変わり続ける問題」の違い</text>
</svg>