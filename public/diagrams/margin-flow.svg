<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 278" role="img">
<rect width="640" height="278" fill="#ffffff"/>
<line x1="0" y1="55.6" x2="640" y2="55.6" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="111.2" x2="640" y2="111.2" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="166.8" x2="640" y2="166.8" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="222.4" x2="640" y2="222.4" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="28" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">証拠金取引の防衛ライン（証拠金維持率の低下と措置）</text><rect x="70" y="55" width="500" height="48" rx="8" fill="#ffffff" stroke="#71809a" stroke-width="2"/><text x="90" y="77" font-size="13" fill="#71809a" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">含み損の拡大</text><text x="90" y="95" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">証拠金維持率が低下していく</text><line x1="320" y1="105" x2="320" y2="115" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="320,115 316.0853101929989,106.89597607882591 323.9146898070011,106.89597607882591" fill="#57606e"/><rect x="70" y="117" width="500" height="48" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><text x="90" y="139" font-size="13" fill="#a3690f" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">追証（マージンコール）</text><text x="90" y="157" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">維持率が基準を下回ると追加入金を要求される</text><line x1="320" y1="167" x2="320" y2="177" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="320,177 316.0853101929989,168.8959760788259 323.9146898070011,168.8959760788259" fill="#57606e"/><rect x="70" y="179" width="500" height="48" rx="8" fill="#ffffff" stroke="#c73e2e" stroke-width="2"/><text x="90" y="201" font-size="13" fill="#c73e2e" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ロスカット</text><text x="90" y="219" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">さらに下回ると強制決済（急変時は間に合わないことも）</text><text x="320" y="262" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ロスカットは投資家保護の仕組みだが、預けた資金以上の損失を防ぐ保証ではない</text>
</svg>