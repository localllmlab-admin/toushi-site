<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 265" role="img">
<rect width="640" height="265" fill="#ffffff"/>
<line x1="0" y1="53" x2="640" y2="53" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="106" x2="640" y2="106" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="159" x2="640" y2="159" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="212" x2="640" y2="212" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="24" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ローソク足の基本形：実体とヒゲの比率が「勢いと迷い」を語る</text><line x1="75" y1="55" x2="75" y2="175" stroke="#c73e2e" stroke-width="2"  stroke-linecap="round"/><rect x="66" y="60" width="18" height="110" rx="1.5" fill="#c73e2e"/><text x="75" y="200" font-size="11" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">大陽線</text><text x="75" y="218" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">強い買い優勢</text><line x1="165" y1="55" x2="165" y2="175" stroke="#0075c2" stroke-width="2"  stroke-linecap="round"/><rect x="156" y="60" width="18" height="110" rx="1.5" fill="#0075c2"/><text x="165" y="200" font-size="11" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">大陰線</text><text x="165" y="218" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">強い売り優勢</text><line x1="255" y1="90" x2="255" y2="150" stroke="#c73e2e" stroke-width="2"  stroke-linecap="round"/><rect x="248" y="105" width="14" height="25" rx="1.5" fill="#c73e2e"/><text x="255" y="200" font-size="11" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">小陽線（コマ）</text><text x="255" y="218" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">小幅の攻防</text><line x1="345" y1="70" x2="345" y2="165" stroke="#c73e2e" stroke-width="2"  stroke-linecap="round"/><rect x="338" y="116" width="14" height="2" rx="1.5" fill="#c73e2e"/><text x="345" y="200" font-size="11" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">十字線（同事線）</text><text x="345" y="218" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">売買の拮抗・迷い</text><line x1="435" y1="75" x2="435" y2="170" stroke="#0075c2" stroke-width="2"  stroke-linecap="round"/><rect x="428" y="75" width="14" height="3" rx="1.5" fill="#0075c2"/><text x="435" y="200" font-size="11" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">トンボ</text><text x="435" y="218" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">下ヒゲ長・下値で買い</text><line x1="525" y1="70" x2="525" y2="170" stroke="#0075c2" stroke-width="2"  stroke-linecap="round"/><rect x="518" y="165" width="14" height="3" rx="1.5" fill="#0075c2"/><text x="525" y="200" font-size="11" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">トウバ</text><text x="525" y="218" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">上ヒゲ長・上値で売り</text><text x="320" y="250" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">実体が長い＝一方の勢いが強い ／ ヒゲが長い＝その方向への試みが押し返された跡</text>
</svg>