<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" role="img">
<rect width="640" height="320" fill="#ffffff"/>
<line x1="0" y1="64" x2="640" y2="64" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="128" x2="640" y2="128" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="192" x2="640" y2="192" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="256" x2="640" y2="256" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<polyline points="40,240 110,200 180,170 250,120 320,70 390,60 450,100 510,180 570,250" fill="none" stroke="#26313f" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><text x="150" y="45" font-size="12" fill="#0075c2" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">楽観の頂点：皆が強気＝新たな買い手は残りわずか</text><text x="570" y="280" font-size="12" fill="#c73e2e" text-anchor="end" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">悲観の底：皆が弱気</text><text x="100" y="175" font-size="11.5" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「まだ早い」</text><text x="250" y="100" font-size="11.5" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「乗り遅れるな」</text><text x="400" y="95" font-size="11.5" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「今回は違う」</text><text x="465" y="130" font-size="11.5" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「やはり駄目だ」</text><text x="320" y="300" font-size="12" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">格言は「多数派が極端に傾いたときこそ注意せよ」という戒めとして解釈される</text>
</svg>