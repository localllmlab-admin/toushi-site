<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 290" role="img">
<rect width="640" height="290" fill="#ffffff"/>
<line x1="0" y1="58" x2="640" y2="58" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="116" x2="640" y2="116" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="174" x2="640" y2="174" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="232" x2="640" y2="232" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="26" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">R倍数による目標設定：損切り距離を利益の物差しにする</text><rect x="120" y="196" width="400" height="44" rx="4" fill="#0075c2" opacity="0.14"/><text x="320" y="222" font-size="12" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">1R ＝ エントリーから損切りまでの距離（許容損失）</text><rect x="120" y="152" width="400" height="40" rx="4" fill="#c73e2e" opacity="0.35"/><text x="320" y="177" font-size="12" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">＋1R </text><rect x="120" y="108" width="400" height="40" rx="4" fill="#c73e2e" opacity="0.5"/><text x="320" y="133" font-size="12" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">＋2R = 必要勝率33%の分岐点</text><rect x="120" y="64" width="400" height="40" rx="4" fill="#c73e2e" opacity="0.65"/><text x="320" y="89" font-size="12" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">＋3R </text><line x1="120" y1="192" x2="520" y2="192" stroke="#26313f" stroke-width="2"  stroke-linecap="round"/><text x="110" y="196" font-size="11.5" fill="#26313f" text-anchor="end" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">買値</text><text x="320" y="275" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">目標を2R以上に置けるエントリーだけを選ぶ、という「取引の入口の選別基準」としても機能する</text>
</svg>