<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" role="img">
<rect width="640" height="300" fill="#ffffff"/>
<line x1="0" y1="60" x2="640" y2="60" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="120" x2="640" y2="120" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="180" x2="640" y2="180" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="240" x2="640" y2="240" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="24" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">市場間分析：4つの市場は互いに影響し合う</text><rect x="60" y="55" width="170" height="62" rx="8" fill="#ffffff" stroke="#0075c2" stroke-width="2"/><text x="145" y="80" font-size="12" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">金利（債券）</text><text x="145" y="100" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">利回り上昇＝債券価格下落</text><rect x="410" y="55" width="170" height="62" rx="8" fill="#ffffff" stroke="#c73e2e" stroke-width="2"/><text x="495" y="80" font-size="12" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">株式</text><text x="495" y="100" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">将来利益の割引価値</text><rect x="60" y="185" width="170" height="62" rx="8" fill="#ffffff" stroke="#1f6e50" stroke-width="2"/><text x="145" y="210" font-size="12" fill="#1f6e50" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">為替</text><text x="145" y="230" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">金利差・資金フロー</text><rect x="410" y="185" width="170" height="62" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><text x="495" y="210" font-size="12" fill="#a3690f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">商品</text><text x="495" y="230" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">インフレ・需給</text><line x1="235" y1="86" x2="405" y2="86" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="405,86 396.8959760788259,89.91468980700107 396.8959760788259,82.08531019299893" fill="#57606e"/><text x="320" y="76" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">金利上昇は株の逆風になりやすい</text><line x1="145" y1="122" x2="145" y2="180" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="145,180 141.08531019299892,171.8959760788259 148.91468980700108,171.8959760788259" fill="#57606e"/><text x="152" y="155" font-size="9.5" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">金利差が通貨の強弱に</text><line x1="235" y1="216" x2="405" y2="216" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="405,216 396.8959760788259,219.91468980700108 396.8959760788259,212.08531019299892" fill="#57606e"/><text x="320" y="240" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">通貨の強弱が輸出入価格に</text><line x1="495" y1="180" x2="495" y2="122" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="495,122 498.9146898070011,130.1040239211741 491.0853101929989,130.1040239211741" fill="#57606e"/><text x="502" y="155" font-size="9.5" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">資源高はインフレ→金利へ</text><text x="320" y="285" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">関係の向きや強さは時代・局面で変わる。「常に成り立つ法則」ではなく点検の枠組みとして使う（模式図）</text>
</svg>