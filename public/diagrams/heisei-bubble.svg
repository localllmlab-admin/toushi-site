<text x="320" y="28" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">日経平均株価の軌跡（1985〜1992年・模式図）</text><polyline points="60,230 120,205 180,175 240,140 300,100 350,65 390,48 430,80 470,130 510,175 560,210" fill="none" stroke="#26313f" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><circle cx="390" cy="48" r="8" fill="none" stroke="#0075c2" stroke-width="2.2"/><text x="390" y="32" font-size="11.5" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">1989年末 38,915円（史上最高値・当時）</text><text x="150" y="155" font-size="11" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">プラザ合意後の金融緩和</text><text x="170" y="172" font-size="11" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「土地は下がらない」神話</text><text x="480" y="110" font-size="11" fill="#0075c2" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">金融引き締め・</text><text x="480" y="126" font-size="11" fill="#0075c2" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">総量規制を機に崩壊</text><text x="320" y="275" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">回復には30年以上を要した（2024年に最高値更新）。「バブルは崩壊後の処理が本番」の代表例</text>
