<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 250" role="img">
<rect width="640" height="250" fill="#ffffff"/>
<line x1="0" y1="50" x2="640" y2="50" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="100" x2="640" y2="100" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="150" x2="640" y2="150" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="200" x2="640" y2="200" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="30" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">利益確定の3つの流派 ― どれかが正解ではなく、手法との整合が正解</text><rect x="40" y="58" width="180" height="140" rx="8" fill="#ffffff" stroke="#2b4a8b" stroke-width="2"/><rect x="40" y="58" width="180" height="30" rx="8" fill="#2b4a8b"/><rect x="40" y="80" width="180" height="8" fill="#2b4a8b"/><text x="130" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">① 目標値で決める</text><text x="54" y="110" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">値幅観測・次の抵抗帯・</text><text x="54" y="130" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">R倍数などで事前に</text><text x="54" y="150" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">出口価格を決めておく</text><text x="54" y="170" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">→ 勝率型。取り逃しは</text><text x="54" y="190" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">　許容する</text><rect x="230" y="58" width="180" height="140" rx="8" fill="#ffffff" stroke="#1f6e50" stroke-width="2"/><rect x="230" y="58" width="180" height="30" rx="8" fill="#1f6e50"/><rect x="230" y="80" width="180" height="8" fill="#1f6e50"/><text x="320" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">② 追随して決める</text><text x="244" y="110" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">トレーリングストップで</text><text x="244" y="130" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">転換の兆しまで持ち続ける</text><text x="244" y="150" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">→ 損益比型。大相場を</text><text x="244" y="170" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">　取り、勝率と</text><text x="244" y="190" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">　返上分を差し出す</text><rect x="420" y="58" width="180" height="140" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><rect x="420" y="58" width="180" height="30" rx="8" fill="#a3690f"/><rect x="420" y="80" width="180" height="8" fill="#a3690f"/><text x="510" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">③ 時間で決める</text><text x="434" y="110" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">決めた期間が来たら</text><text x="434" y="130" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">決済する（イベント通過・</text><text x="434" y="150" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">保有期限）</text><text x="434" y="170" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">→ 検証しやすく</text><text x="434" y="190" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">　規律を保ちやすい</text><text x="320" y="232" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">3流派は組み合わせ可能（例：半分を目標値で確定し、残りをトレーリング）</text>
</svg>