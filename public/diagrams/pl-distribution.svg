<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 270" role="img">
<rect width="640" height="270" fill="#ffffff"/>
<line x1="0" y1="54" x2="640" y2="54" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="108" x2="640" y2="108" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="162" x2="640" y2="162" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="216" x2="640" y2="216" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="26" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">損益分布の「形」を変える ― 利小損大から損小利大へ</text><text x="165" y="55" font-size="11.5" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">矯正前：利益は早取り・損失は放置</text><rect x="60" y="170" width="24" height="30" fill="#0075c2" opacity="0.75"/><rect x="90" y="145" width="24" height="55" fill="#0075c2" opacity="0.75"/><rect x="120" y="180" width="24" height="20" fill="#c73e2e" opacity="0.75"/><rect x="150" y="130" width="24" height="70" fill="#c73e2e" opacity="0.75"/><rect x="180" y="140" width="24" height="60" fill="#c73e2e" opacity="0.75"/><rect x="210" y="175" width="24" height="25" fill="#c73e2e" opacity="0.75"/><text x="75" y="215" font-size="10" fill="#0075c2" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">大きな損失の裾</text><text x="180" y="215" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">小さな利益の山</text><text x="470" y="55" font-size="11.5" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">矯正後：損失は−1Rで揃い、利益に裾</text><rect x="340" y="155" width="24" height="45" fill="#0075c2" opacity="0.75"/><rect x="370" y="152" width="24" height="48" fill="#0075c2" opacity="0.75"/><rect x="400" y="154" width="24" height="46" fill="#0075c2" opacity="0.75"/><rect x="430" y="145" width="24" height="55" fill="#c73e2e" opacity="0.75"/><rect x="460" y="160" width="24" height="40" fill="#c73e2e" opacity="0.75"/><rect x="490" y="172" width="24" height="28" fill="#c73e2e" opacity="0.75"/><rect x="520" y="182" width="24" height="18" fill="#c73e2e" opacity="0.75"/><rect x="550" y="190" width="24" height="10" fill="#c73e2e" opacity="0.75"/><text x="385" y="215" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">損失は一定幅で整列</text><text x="530" y="215" font-size="10" fill="#c73e2e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">大きな利益の裾</text><line x1="320" y1="45" x2="320" y2="220" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><text x="320" y="255" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">利確ルールの目的は「毎回勝つ」ことではなく、損益分布の右側に裾（大きな利益）を残すこと</text>
</svg>