<text x="320" y="26" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">スイングトレード：数日〜数週間の「波のひと振り」を取りにいく</text><polyline points="60,200 110,170 140,185 200,140 235,158 300,110 335,130 400,85 440,100 500,60" fill="none" stroke="#26313f" stroke-width="2.2"  stroke-linejoin="round" stroke-linecap="round"/><line x1="140" y1="215" x2="140" y2="190" stroke="#c73e2e" stroke-width="2.5"  stroke-linecap="round"/><polygon points="140,190 143.91468980700108,198.1040239211741 136.08531019299892,198.1040239211741" fill="#c73e2e"/><text x="140" y="230" font-size="10.5" fill="#c73e2e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">押し目で仕掛け</text><line x1="300" y1="80" x2="300" y2="105" stroke="#0075c2" stroke-width="2.5"  stroke-linecap="round"/><polygon points="300,105 296.0853101929989,96.89597607882591 303.9146898070011,96.89597607882591" fill="#0075c2"/><text x="300" y="71" font-size="10.5" fill="#0075c2" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">波の終わりで手仕舞い</text><line x1="60" y1="245" x2="500" y2="245" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><text x="280" y="264" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">1回の波：数日〜数週間 ／ 日をまたいで保有する＝夜間のリスクも引き受ける</text><text x="555" y="150" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">日足・週足が主戦場。</text><text x="555" y="168" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">画面に張り付かず</text><text x="555" y="186" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">夜の分析で完結しやすい</text>
