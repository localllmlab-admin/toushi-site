<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 310" role="img">
<rect width="640" height="310" fill="#ffffff"/>
<line x1="0" y1="62" x2="640" y2="62" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="124" x2="640" y2="124" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="186" x2="640" y2="186" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="248" x2="640" y2="248" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<rect x="30" y="40" width="270" height="220" rx="8" fill="#f7fafd" stroke="#dde3ec"/><text x="165" y="70" font-size="15" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">テクニカル分析</text><polyline points="60,210 100,160 130,185 170,120 200,145 240,100 270,115" fill="none" stroke="#0075c2" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><text x="165" y="240" font-size="12" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">値動き（チャート）から考える</text><rect x="340" y="40" width="270" height="220" rx="8" fill="#f7fafd" stroke="#dde3ec"/><text x="475" y="70" font-size="15" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ファンダメンタル分析</text><rect x="380" y="95" width="190" height="30" rx="4" fill="#ffffff" stroke="#dde3ec"/><text x="475" y="115" font-size="13" fill="#26313f" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">業績・財務</text><rect x="380" y="137" width="190" height="30" rx="4" fill="#ffffff" stroke="#dde3ec"/><text x="475" y="157" font-size="13" fill="#26313f" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">金利・景気</text><rect x="380" y="179" width="190" height="30" rx="4" fill="#ffffff" stroke="#dde3ec"/><text x="475" y="199" font-size="13" fill="#26313f" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">制度・政策</text><text x="475" y="240" font-size="12" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">価値（本来の値打ち）から考える</text><text x="320" y="290" font-size="12.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「何を買うか」はファンダ、「いつ買うか」はテクニカル、という整理が一般的</text>
