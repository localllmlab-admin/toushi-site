<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 330" role="img">
<rect width="640" height="330" fill="#ffffff"/>
<line x1="0" y1="66" x2="640" y2="66" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="132" x2="640" y2="132" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="198" x2="640" y2="198" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="264" x2="640" y2="264" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="28" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">原指数が上下して元に戻っても、2倍型は元に戻らない（例: 100→90→99）</text><polyline points="140,210 320,226 500,211.6" fill="none" stroke="#26313f" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><polyline points="140,210 320,242 500,216.4" fill="none" stroke="#0075c2" stroke-width="2.5" stroke-dasharray="6 3" stroke-linejoin="round" stroke-linecap="round"/><circle cx="140" cy="210" r="4" fill="#26313f"/><text x="140" y="200" font-size="12" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">100</text><circle cx="320" cy="226" r="4" fill="#26313f"/><text x="320" y="216" font-size="12" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">90</text><circle cx="500" cy="211.6" r="4" fill="#26313f"/><text x="514" y="201.6" font-size="12" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">99</text><circle cx="140" cy="210" r="4" fill="#0075c2"/><text x="140" y="230" font-size="12" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">100</text><circle cx="320" cy="242" r="4" fill="#0075c2"/><text x="320" y="262" font-size="12" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">80</text><circle cx="500" cy="216.4" r="4" fill="#0075c2"/><text x="514" y="236.4" font-size="12" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">96</text><text x="555" y="203.6" font-size="12" fill="#26313f" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">原指数</text><text x="555" y="240.4" font-size="12" fill="#0075c2" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">2倍型</text><text x="140" y="285" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">当初</text><text x="320" y="285" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">-10%の日</text><text x="500" y="285" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">+10%の日</text><text x="320" y="315" font-size="12" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">毎日「その日の2倍」を目指す仕組みのため、上下動を繰り返すと徐々に目減りする（減価）</text>
</svg>