t x="326" y="112" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">過去データで</text><text x="326" y="130" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">バックテスト</text><line x1="378" y1="107" x2="392" y2="107" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="392,107 383.8959760788259,110.91468980700107 383.8959760788259,103.08531019299893" fill="#57606e"/><rect x="394" y="60" width="100" height="95" rx="8" fill="#ffffff" stroke="#c73e2e" stroke-width="2"/><text x="444" y="87" font-size="13" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">運用</text><text x="444" y="112" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ルール通りに</text><text x="444" y="130" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">機械的に執行</text><line x1="496" y1="107" x2="510" y2="107" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="510,107 501.8959760788259,110.91468980700107 501.8959760788259,103.08531019299893" fill="#57606e"/><rect x="512" y="60" width="100" height="95" rx="8" fill="#ffffff" stroke="#6b4fa0" stroke-width="2"/><text x="562" y="87" font-size="13" fill="#6b4fa0" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">監視</text><text x="562" y="112" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">劣化を検知し</text><text x="562" y="130" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">改良・停止判断</text><text x="320" y="190" font-size="12" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">人