<text x="320" y="24" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">OBV：出来高を「上げた日は足し、下げた日は引く」だけの累積線</text><polyline points="60,110 130,70 200,95 280,60 360,85 450,52 560,75" fill="none" stroke="#26313f" stroke-width="2.2"  stroke-linejoin="round" stroke-linecap="round"/><text x="60" y="55" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">価格：高値を更新</text><circle cx="280" cy="60" r="5" fill="none" stroke="#c73e2e" stroke-width="2"/><circle cx="450" cy="52" r="5" fill="none" stroke="#c73e2e" stroke-width="2"/><line x1="40" y1="135" x2="600" y2="135" stroke="#dde3ec" stroke-width="1.5"  stroke-linecap="round"/><polyline points="60,220 130,185 200,205 280,178 360,210 450,195 560,230" fill="none" stroke="#a3690f" stroke-width="2.2"  stroke-linejoin="round" stroke-linecap="round"/><text x="60" y="170" font-size="10.5" fill="#a3690f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">OBV：高値を更新できない</text><line x1="280" y1="178" x2="450" y2="195" stroke="#0075c2" stroke-width="2" stroke-dasharray="5 4" stroke-linecap="round"/><text x="500" y="245" font-size="10.5" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">弱気ダイバージェンス</text><text x="320" y="285" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">価格の高値更新に出来高の裏付けがない状態。転換の予告ではなく「注意信号」として扱う（模式図）</text>
