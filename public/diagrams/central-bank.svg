<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 275" role="img">
<rect width="640" height="275" fill="#ffffff"/>
<line x1="0" y1="55" x2="640" y2="55" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="110" x2="640" y2="110" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="165" x2="640" y2="165" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="220" x2="640" y2="220" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="30" font-size="13.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">中央銀行（日本銀行）の3つの顔と金融政策</text><rect x="40" y="58" width="180" height="105" rx="8" fill="#ffffff" stroke="#2b4a8b" stroke-width="2"/><rect x="40" y="58" width="180" height="30" rx="8" fill="#2b4a8b"/><rect x="40" y="80" width="180" height="8" fill="#2b4a8b"/><text x="130" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">発券銀行</text><text x="54" y="110" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">紙幣（日本銀行券）を</text><text x="54" y="130" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">発行する唯一の主体</text><text x="54" y="150" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">通貨の信認を守る</text><rect x="230" y="58" width="180" height="105" rx="8" fill="#ffffff" stroke="#1f6e50" stroke-width="2"/><rect x="230" y="58" width="180" height="30" rx="8" fill="#1f6e50"/><rect x="230" y="80" width="180" height="8" fill="#1f6e50"/><text x="320" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">銀行の銀行</text><text x="244" y="110" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">民間銀行から預金を受け入れ</text><text x="244" y="130" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">資金を貸し出す</text><text x="244" y="150" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">決済システムの中核</text><rect x="420" y="58" width="180" height="105" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><rect x="420" y="58" width="180" height="30" rx="8" fill="#a3690f"/><rect x="420" y="80" width="180" height="8" fill="#a3690f"/><text x="510" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">政府の銀行</text><text x="434" y="110" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">国庫金の出納を担う</text><text x="434" y="130" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（政府の資金の</text><text x="434" y="150" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">　受け払いを処理）</text><rect x="40" y="180" width="560" height="75" rx="8" fill="#e9f2fb" stroke="#dde3ec"/><text x="320" y="205" font-size="12" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">金融政策：物価の安定を目的に、政策金利や資産買入れで世の中のお金の量・金利を調節</text><text x="320" y="228" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">利上げ＝経済の熱を冷ます／利下げ＝経済を温める。決定は金融政策決定会合（年8回）で公表</text>
</svg>