<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" role="img">
<rect width="640" height="300" fill="#ffffff"/>
<line x1="0" y1="60" x2="640" y2="60" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="120" x2="640" y2="120" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="180" x2="640" y2="180" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="240" x2="640" y2="240" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="30" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">地政学リスク（紛争・対立）が市場へ波及する代表的な経路</text><rect x="230" y="55" width="180" height="46" rx="8" fill="#26313f"/><text x="320" y="84" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">地政学イベント</text><line x1="255" y1="104" x2="140" y2="140" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="140,140 146.56442729818352,133.8430288089952 148.90343466025416,141.3148578822765" fill="#57606e"/><line x1="320" y1="104" x2="320" y2="140" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="320,140 316.0853101929989,131.8959760788259 323.9146898070011,131.8959760788259" fill="#57606e"/><line x1="385" y1="104" x2="500" y2="140" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="500,140 491.09656533974584,141.3148578822765 493.4355727018165,133.8430288089952" fill="#57606e"/><rect x="40" y="145" width="180" height="110" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><rect x="40" y="145" width="180" height="30" rx="8" fill="#a3690f"/><rect x="40" y="167" width="180" height="8" fill="#a3690f"/><text x="130" y="166" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">資源・供給網</text><text x="54" y="197" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">原油・穀物・半導体などの</text><text x="54" y="217" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">供給不安 → 価格急騰</text><text x="54" y="237" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">→ インフレ圧力に波及</text><rect x="230" y="145" width="180" height="110" rx="8" fill="#ffffff" stroke="#2b4a8b" stroke-width="2"/><rect x="230" y="145" width="180" height="30" rx="8" fill="#2b4a8b"/><rect x="230" y="167" width="180" height="8" fill="#2b4a8b"/><text x="320" y="166" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">リスク回避</text><text x="244" y="197" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">株式などリスク資産から</text><text x="244" y="217" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">資金が引き上げられ</text><text x="244" y="237" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「質への逃避」が起きる</text><rect x="420" y="145" width="180" height="110" rx="8" fill="#ffffff" stroke="#1f6e50" stroke-width="2"/><rect x="420" y="145" width="180" height="30" rx="8" fill="#1f6e50"/><rect x="420" y="167" width="180" height="8" fill="#1f6e50"/><text x="510" y="166" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">安全資産</text><text x="434" y="197" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">金・米国債・スイスフラン</text><text x="434" y="217" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">などに資金が向かう傾向</text><text x="434" y="237" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（時期により顔ぶれは変化）</text><text x="320" y="285" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">※市場の反応は「事前にどこまで織り込んでいたか」次第。事件の大きさ＝下落の大きさではない</text>
</svg>