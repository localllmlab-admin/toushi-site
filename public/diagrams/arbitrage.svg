<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 225" role="img">
<rect width="640" height="225" fill="#ffffff"/>
<line x1="0" y1="45" x2="640" y2="45" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="90" x2="640" y2="90" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="135" x2="640" y2="135" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="180" x2="640" y2="180" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="26" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">アービトラージ：同じ価値のものが違う値段で売られている瞬間を突く</text><rect x="60" y="60" width="200" height="90" rx="8" fill="#ffffff" stroke="#0075c2" stroke-width="2"/><text x="160" y="88" font-size="12.5" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">市場X</text><text x="160" y="115" font-size="12" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">同一資産：100.0</text><text x="160" y="136" font-size="11" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">→ ここで買う</text><rect x="380" y="60" width="200" height="90" rx="8" fill="#ffffff" stroke="#1f6e50" stroke-width="2"/><text x="480" y="88" font-size="12.5" fill="#1f6e50" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">市場Y</text><text x="480" y="115" font-size="12" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">同一資産：100.4</text><text x="480" y="136" font-size="11" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">→ ここで売る</text><line x1="270" y1="105" x2="370" y2="105" stroke="#a3690f" stroke-width="2.5"  stroke-linecap="round"/><polygon points="370,105 361.8959760788259,108.91468980700107 361.8959760788259,101.08531019299893" fill="#a3690f"/><text x="320" y="95" font-size="10.5" fill="#a3690f" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">差0.4が理論上の利益</text><text x="320" y="185" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ただし価格差は皆が狙うため一瞬で消える。コスト（手数料・送金・時間）を引いた残りが実際の利益</text><text x="320" y="207" font-size="10.5" fill="#c73e2e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「無リスク」と呼ばれるのは教科書の中だけ。執行・カウンターパーティ・規制のリスクは常に残る</text>
</svg>