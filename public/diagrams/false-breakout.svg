<text x="320" y="26" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">だまし：ブレイクに見せかけて、すぐ元のレンジへ戻る</text><line x1="60" y1="110" x2="560" y2="110" stroke="#a3690f" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round"/><text x="575" y="114" font-size="10.5" fill="#a3690f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">抵抗線</text><polyline points="70,180 110,140 150,170 190,130 230,165 270,125 310,150 350,88 380,100 410,160 450,200 500,230" fill="none" stroke="#26313f" stroke-width="2.2"  stroke-linejoin="round" stroke-linecap="round"/><line x1="350" y1="60" x2="350" y2="82" stroke="#c73e2e" stroke-width="2.2"  stroke-linecap="round"/><polygon points="350,82 346.0853101929989,73.89597607882591 353.9146898070011,73.89597607882591" fill="#c73e2e"/><text x="350" y="52" font-size="10.5" fill="#c73e2e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「ブレイクだ」と買いが乗る</text><line x1="430" y1="140" x2="450" y2="190" stroke="#0075c2" stroke-width="2.2"  stroke-linecap="round"/><polygon points="450,190 443.3555428368787,183.92948198195194 450.62493931257194,181.02172339167464" fill="#0075c2"/><text x="485" y="150" font-size="10.5" fill="#0075c2" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">すぐ線の内側へ逆戻り</text><text x="490" y="168" font-size="10.5" fill="#0075c2" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">＝乗った買いが損失に</text><text x="320" y="262" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">終値での確定・出来高の裏付け・値幅フィルターなど、「本物の放れ」と区別する工夫が対抗策になる</text>
