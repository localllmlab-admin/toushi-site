<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 265" role="img">
<rect width="640" height="265" fill="#ffffff"/>
<line x1="0" y1="53" x2="640" y2="53" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="106" x2="640" y2="106" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="159" x2="640" y2="159" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="212" x2="640" y2="212" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="30" font-size="13.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">iDeCo＝自分でつくる年金。3つの場面で税制上の扱いが異なる</text><rect x="40" y="60" width="170" height="120" rx="8" fill="#ffffff" stroke="#2b4a8b" stroke-width="2"/><rect x="40" y="60" width="170" height="30" rx="8" fill="#2b4a8b"/><rect x="40" y="82" width="170" height="8" fill="#2b4a8b"/><text x="125" y="81" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">① 拠出時</text><text x="54" y="112" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">掛金が全額</text><text x="54" y="132" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">所得控除の対象</text><text x="54" y="152" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（所得税・住民税が</text><text x="54" y="172" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">　軽くなる）</text><rect x="235" y="60" width="170" height="120" rx="8" fill="#ffffff" stroke="#1f6e50" stroke-width="2"/><rect x="235" y="60" width="170" height="30" rx="8" fill="#1f6e50"/><rect x="235" y="82" width="170" height="8" fill="#1f6e50"/><text x="320" y="81" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">② 運用時</text><text x="249" y="112" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">運用益に</text><text x="249" y="132" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">課税されない</text><text x="249" y="152" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（複利がそのまま</text><text x="249" y="172" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">　働く）</text><rect x="430" y="60" width="170" height="120" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><rect x="430" y="60" width="170" height="30" rx="8" fill="#a3690f"/><rect x="430" y="82" width="170" height="8" fill="#a3690f"/><text x="515" y="81" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">③ 受取時</text><text x="444" y="112" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">受け取り方に応じ</text><text x="444" y="132" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">課税（ただし</text><text x="444" y="152" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">退職所得控除等の</text><text x="444" y="172" font-size="11.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">控除がある）</text><line x1="212" y1="120" x2="232" y2="120" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="232,120 223.8959760788259,123.91468980700107 223.8959760788259,116.08531019299893" fill="#57606e"/><line x1="407" y1="120" x2="427" y2="120" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="427,120 418.8959760788259,123.91468980700107 418.8959760788259,116.08531019299893" fill="#57606e"/><rect x="40" y="200" width="560" height="46" rx="8" fill="#fff3e6" stroke="#f3d6b3"/><text x="320" y="220" font-size="12.5" fill="#b05a12" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">最大の注意点: 原則60歳まで引き出せない（老後資金専用の制度）</text><text x="320" y="238" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">掛金の上限は職業・企業年金の有無で異なる（公式サイトで要確認）</text>
</svg>