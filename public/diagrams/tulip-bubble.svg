<rect width="640" height="300" fill="#ffffff"/>
<line x1="0" y1="60" x2="640" y2="60" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="120" x2="640" y2="120" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="180" x2="640" y2="180" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="240" x2="640" y2="240" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="28" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">チューリップ球根価格の推移（1634〜1637年・模式図）</text><polyline points="60,240 140,232 220,215 300,185 360,140 400,95 430,60 445,52 460,90 480,170 510,230 560,250" fill="none" stroke="#26313f" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><circle cx="445" cy="52" r="8" fill="none" stroke="#0075c2" stroke-width="2.2"/><text x="430" y="40" font-size="12" fill="#0075c2" text-anchor="end" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">1637年2月：買い手が突然消える</text><text x="200" y="200" font-size="11.5" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「球根1個＝家1軒」の逸話も</text><text x="320" y="285" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">現物の球根ではなく「球根を買う権利」の転売が投機の主戦場になっていた（先物的取引の原型）</text>
