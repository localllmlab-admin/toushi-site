<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 305" role="img">
<rect width="640" height="305" fill="#ffffff"/>
<line x1="0" y1="61" x2="640" y2="61" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="122" x2="640" y2="122" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="183" x2="640" y2="183" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="244" x2="640" y2="244" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="34" font-size="14" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「1ドル＝何円か」で考える（数字が大きい＝円安）</text><line x1="120" y1="160" x2="520" y2="160" stroke="#26313f" stroke-width="2"  stroke-linecap="round"/><circle cx="320" cy="160" r="6" fill="#26313f"/><text x="320" y="140" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">1ドル＝100円</text><line x1="300" y1="160" x2="140" y2="160" stroke="#0075c2" stroke-width="2.5"  stroke-linecap="round"/><polygon points="140,160 148.1040239211741,156.08531019299892 148.1040239211741,163.91468980700108" fill="#0075c2"/><text x="150" y="190" font-size="13" fill="#0075c2" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">1ドル＝80円</text><text x="150" y="212" font-size="12" fill="#0075c2" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">円高：少ない円でドルが買える</text><text x="150" y="232" font-size="12" fill="#0075c2" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">＝円の価値が上がった</text><line x1="340" y1="160" x2="500" y2="160" stroke="#c73e2e" stroke-width="2.5"  stroke-linecap="round"/><polygon points="500,160 491.8959760788259,163.91468980700108 491.8959760788259,156.08531019299892" fill="#c73e2e"/><text x="400" y="190" font-size="13" fill="#c73e2e" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">1ドル＝150円</text><text x="400" y="212" font-size="12" fill="#c73e2e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">円安：多くの円が必要になる</text><text x="400" y="232" font-size="12" fill="#c73e2e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">＝円の価値が下がった</text><text x="320" y="285" font-size="12" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「数字が増えたのに円安？」と混乱したら、円の価値＝1円で買えるドルの量で考える</text>
</svg>