<text x="320" y="30" font-size="13.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">財務3表のつながり（お金の流れの3つの視点）</text><rect x="40" y="58" width="180" height="140" rx="8" fill="#ffffff" stroke="#1f6e50" stroke-width="2"/><rect x="40" y="58" width="180" height="30" rx="8" fill="#1f6e50"/><rect x="40" y="80" width="180" height="8" fill="#1f6e50"/><text x="130" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">損益計算書（PL）</text><text x="54" y="110" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">一定期間の</text><text x="54" y="130" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">収益 − 費用 ＝ 利益</text><text x="54" y="150" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif"></text><text x="54" y="170" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「どれだけ稼いだか」</text><rect x="230" y="58" width="180" height="140" rx="8" fill="#ffffff" stroke="#2b4a8b" stroke-width="2"/><rect x="230" y="58" width="180" height="30" rx="8" fill="#2b4a8b"/><rect x="230" y="80" width="180" height="8" fill="#2b4a8b"/><text x="320" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">貸借対照表（BS）</text><text x="244" y="110" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ある時点の</text><text x="244" y="130" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">資産＝負債＋純資産</text><text x="244" y="150" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif"></text><text x="244" y="170" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「何を持ち何を借りているか」</text><rect x="420" y="58" width="180" height="140" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><rect x="420" y="58" width="180" height="30" rx="8" fill="#a3690f"/><rect x="420" y="80" width="180" height="8" fill="#a3690f"/><text x="510" y="79" font-size="13.5" fill="#fff" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">キャッシュフロー計算書</text><text x="434" y="110" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">一定期間の</text><text x="434" y="130" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">現金の出入り</text><text x="434" y="150" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">（営業・投資・財務）</text><text x="434" y="170" font-size="11" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「現金は増えたか」</text><line x1="222" y1="128" x2="228" y2="128" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="228,128 219.8959760788259,131.91468980700108 219.8959760788259,124.08531019299893" fill="#57606e"/><line x1="412" y1="128" x2="418" y2="128" stroke="#57606e" stroke-width="2"  stroke-linecap="round"/><polygon points="418,128 409.8959760788259,131.91468980700108 409.8959760788259,124.08531019299893" fill="#57606e"/><text x="320" y="225" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">PLの利益はBSの純資産に積み上がり、CFは「利益と現金のズレ」を暴く。3枚セットで1つの物語</text>
