<text x="320" y="24" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">相対株価＝銘柄（業種）÷市場全体：市場に勝っているかを測る</text><polyline points="60,110 140,100 220,108 300,95 380,102 460,92 560,98" fill="none" stroke="#26313f" stroke-width="2.2"  stroke-linejoin="round" stroke-linecap="round"/><text x="70" y="82" font-size="10.5" fill="#26313f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">銘柄の株価（横ばいに見える）</text><line x1="40" y1="140" x2="600" y2="140" stroke="#dde3ec" stroke-width="1.5"  stroke-linecap="round"/><polyline points="60,250 140,235 220,225 300,205 380,190 460,172 560,155" fill="none" stroke="#c73e2e" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><text x="70" y="215" font-size="10.5" fill="#c73e2e" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">相対株価（÷TOPIX）は右肩上がり＝市場平均より強い</text><text x="320" y="288" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">全体が下げる中で下げ渋る銘柄は、相対株価では上昇して見える。「強い業種・銘柄」の選別に使う（模式図）</text>
