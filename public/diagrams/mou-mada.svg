<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 335" role="img">
<rect width="640" height="335" fill="#ffffff"/>
<line x1="0" y1="67" x2="640" y2="67" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="134" x2="640" y2="134" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="201" x2="640" y2="201" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="268" x2="640" y2="268" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<polyline points="40,60 100,110 150,90 210,160 260,140 320,205 370,185 430,245 490,230 550,265 600,258" fill="none" stroke="#26313f" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><circle cx="150" cy="90" r="7" fill="none" stroke="#0075c2" stroke-width="2"/><text x="162" y="82" font-size="11" fill="#0075c2" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「もう底だろう」→まだ</text><circle cx="260" cy="140" r="7" fill="none" stroke="#0075c2" stroke-width="2"/><text x="272" y="132" font-size="11" fill="#0075c2" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「さすがにもう底」→まだ</text><circle cx="370" cy="185" r="7" fill="none" stroke="#0075c2" stroke-width="2"/><text x="382" y="177" font-size="11" fill="#0075c2" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「今度こそ底」→まだ</text><circle cx="550" cy="265" r="7" fill="none" stroke="#c73e2e" stroke-width="2.2"/><text x="543" y="292" font-size="11.5" fill="#c73e2e" text-anchor="end"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">誰も底と言わなくなった頃が底、ということも</text><text x="320" y="320" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「もう」と思うときはまだ途中、「まだ」と思うときはもう終わりに近い ― 自分の感覚を疑う格言</text>
</svg>