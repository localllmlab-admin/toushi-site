<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 275" role="img">
<rect width="640" height="275" fill="#ffffff"/>
<line x1="0" y1="55" x2="640" y2="55" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="110" x2="640" y2="110" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="165" x2="640" y2="165" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="220" x2="640" y2="220" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="26" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">マルチタイムフレーム分析：上位足で環境認識、下位足でタイミング</text><rect x="35" y="52" width="170" height="150" rx="8" fill="#ffffff" stroke="#dde3ec" stroke-width="1.5"/><text x="120" y="72" font-size="12" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">月足・週足（森）</text><polyline points="50,177 80,152 105,164 135,132 160,144 190,112" fill="none" stroke="#26313f" stroke-width="2"  stroke-linejoin="round" stroke-linecap="round"/><text x="120" y="220" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">大きな流れ＝上昇</text><line x1="215" y1="125" x2="245" y2="125" stroke="#57606e" stroke-width="2.5"  stroke-linecap="round"/><polygon points="245,125 236.8959760788259,128.91468980700108 236.8959760788259,121.08531019299893" fill="#57606e"/><rect x="255" y="52" width="170" height="150" rx="8" fill="#ffffff" stroke="#dde3ec" stroke-width="1.5"/><text x="340" y="72" font-size="12" fill="#1f6e50" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">日足（木）</text><polyline points="270,122 295,152 315,137 340,172 365,157 385,177 410,142" fill="none" stroke="#26313f" stroke-width="2"  stroke-linejoin="round" stroke-linecap="round"/><text x="340" y="220" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">流れの中の押し目</text><line x1="435" y1="125" x2="465" y2="125" stroke="#57606e" stroke-width="2.5"  stroke-linecap="round"/><polygon points="465,125 456.8959760788259,128.91468980700108 456.8959760788259,121.08531019299893" fill="#57606e"/><rect x="445" y="52" width="170" height="150" rx="8" fill="#ffffff" stroke="#dde3ec" stroke-width="1.5"/><text x="530" y="72" font-size="12" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">1時間足（枝）</text><polyline points="460,177 485,167 505,174 530,152 555,160 575,137 600,127" fill="none" stroke="#26313f" stroke-width="2"  stroke-linejoin="round" stroke-linecap="round"/><text x="530" y="220" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">反転の兆しで仕掛け</text><text x="320" y="258" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">時間足ごとに見える景色は違う。上位足の方向と下位足のタイミングを一致させるのが基本形</text>
</svg>