<text x="320" y="28" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">年2%のインフレが続いた場合の「現金100万円で買える量」（理論値）</text><rect x="80" y="70" width="80" height="180" rx="4" fill="#0075c2" opacity="1"/><text x="120" y="58" font-size="12.5" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">100万円分</text><text x="120" y="270" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">現在</text><rect x="220" y="102.4" width="80" height="147.6" rx="4" fill="#0075c2" opacity="0.8200000000000001"/><text x="260" y="90.4" font-size="12.5" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">82万円分</text><text x="260" y="270" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">10年後</text><rect x="360" y="129.39999999999998" width="80" height="120.60000000000001" rx="4" fill="#0075c2" opacity="0.64"/><text x="400" y="117.39999999999999" font-size="12.5" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">67万円分</text><text x="400" y="270" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">20年後</text><rect x="500" y="151" width="80" height="99" rx="4" fill="#0075c2" opacity="0.45999999999999996"/><text x="540" y="139" font-size="12.5" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">55万円分</text><text x="540" y="270" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">30年後</text><text x="320" y="300" font-size="11.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">物価が上がる＝同じ現金で買える量が減る。「現金は無リスク」はインフレ下では成り立たない</text>
