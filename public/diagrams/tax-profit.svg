<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" role="img">
<rect width="640" height="260" fill="#ffffff"/>
<line x1="0" y1="52" x2="640" y2="52" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="104" x2="640" y2="104" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="156" x2="640" y2="156" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="208" x2="640" y2="208" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="28" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">利益確定と税金：口座で手取りが変わる（概要）</text><rect x="80" y="60" width="200" height="150" rx="8" fill="#ffffff" stroke="#0075c2" stroke-width="2"/><text x="180" y="85" font-size="12.5" fill="#0075c2" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">課税口座（特定口座等）</text><rect x="110" y="100" width="140" height="60" fill="#c73e2e" opacity="0.7"/><rect x="110" y="100" width="140" height="13" fill="#0075c2"/><text x="180" y="180" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">利益100万円 → 税 約20.3万円</text><text x="180" y="197" font-size="11.5" fill="#57606e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">手取り 約79.7万円</text><rect x="360" y="60" width="200" height="150" rx="8" fill="#ffffff" stroke="#1d7a3e" stroke-width="2"/><text x="460" y="85" font-size="12.5" fill="#1d7a3e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">NISA口座</text><rect x="390" y="100" width="140" height="60" fill="#c73e2e" opacity="0.7"/><text x="460" y="180" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">利益100万円 → 税 0円</text><text x="460" y="197" font-size="11.5" fill="#57606e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">手取り 100万円</text><text x="320" y="245" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">課税口座の「利確」は税コストを伴う＝頻繁な乗り換えは税の複利を失う。口座と出口設計はセットで考える</text>
</svg>