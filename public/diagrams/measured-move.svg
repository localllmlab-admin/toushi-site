<text x="320" y="26" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">値幅観測の基本形（N計算：直前の上げ幅を押し目から投影）</text><polyline points="60,250 140,160" fill="none" stroke="#26313f" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><polyline points="140,160 200,195" fill="none" stroke="#26313f" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><polyline points="200,195 320,105" fill="none" stroke="#26313f" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><line x1="80" y1="250" x2="80" y2="162" stroke="#c73e2e" stroke-width="2"  stroke-linecap="round"/><polygon points="80,162 83.91468980700107,170.1040239211741 76.08531019299893,170.1040239211741" fill="#c73e2e"/><text x="90" y="205" font-size="12" fill="#c73e2e" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">上げ幅 N</text><line x1="230" y1="195" x2="230" y2="107" stroke="#c73e2e" stroke-width="2"  stroke-linecap="round"/><polygon points="230,107 233.91468980700108,115.10402392117409 226.08531019299892,115.10402392117409" fill="#c73e2e"/><text x="240" y="150" font-size="12" fill="#c73e2e" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">同じ幅 N を投影</text><line x1="200" y1="105" x2="420" y2="105" stroke="#a3690f" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round"/><text x="428" y="109" font-size="12" fill="#a3690f" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">目標値の目安</text><text x="115" y="268" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">A→B の上昇</text><text x="200" y="215" font-size="11" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">C（押し目）</text><text x="320" y="300" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「前と同じ規模の波が出る」という仮定に基づく目安。保証ではなく、利確計画の土台となる基準点</text>
