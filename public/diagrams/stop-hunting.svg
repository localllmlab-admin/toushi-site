<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 310" role="img">
<rect width="640" height="310" fill="#ffffff"/>
<line x1="0" y1="62" x2="640" y2="62" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="124" x2="640" y2="124" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="186" x2="640" y2="186" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="248" x2="640" y2="248" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="24" font-size="12" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「損刈り」の構造：節目の外側は損切り注文＝流動性の溜まり場</text><line x1="60" y1="170" x2="560" y2="170" stroke="#a3690f" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round"/><text x="575" y="174" font-size="10" fill="#a3690f" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">直近安値</text><rect x="150" y="182" width="34" height="9" rx="2" fill="#0075c2" opacity="0.5"/><rect x="195" y="194" width="34" height="9" rx="2" fill="#0075c2" opacity="0.5"/><rect x="240" y="206" width="34" height="9" rx="2" fill="#0075c2" opacity="0.5"/><rect x="285" y="182" width="34" height="9" rx="2" fill="#0075c2" opacity="0.5"/><rect x="330" y="194" width="34" height="9" rx="2" fill="#0075c2" opacity="0.5"/><rect x="375" y="206" width="34" height="9" rx="2" fill="#0075c2" opacity="0.5"/><rect x="420" y="182" width="34" height="9" rx="2" fill="#0075c2" opacity="0.5"/><text x="320" y="232" font-size="10" fill="#0075c2" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">買い方の損切り（売り逆指値）が安値の少し下に集中</text><polyline points="70,120 130,140 190,128 250,150 310,165 350,195 380,205 410,175 470,130 540,100" fill="none" stroke="#26313f" stroke-width="2.2"  stroke-linejoin="round" stroke-linecap="round"/><line x1="380" y1="240" x2="380" y2="212" stroke="#c73e2e" stroke-width="2"  stroke-linecap="round"/><polygon points="380,212 383.9146898070011,220.1040239211741 376.0853101929989,220.1040239211741" fill="#c73e2e"/><text x="430" y="250" font-size="10" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">損切りを巻き込んで下げた後、</text><text x="430" y="266" font-size="10" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">売りが枯れて急反発することがある</text><text x="320" y="296" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">大口にとって損切り注文の集中帯は「大きな注文を約定させられる場所」。陰謀ではなく注文分布の帰結</text>
</svg>