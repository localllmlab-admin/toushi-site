<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 295" role="img">
<rect width="640" height="295" fill="#ffffff"/>
<line x1="0" y1="59" x2="640" y2="59" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="118" x2="640" y2="118" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="177" x2="640" y2="177" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="236" x2="640" y2="236" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="28" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">南海会社株とニュートンの売買（1720年・逸話に基づく模式図）</text><polyline points="60,240 130,225 200,195 260,150 320,90 380,55 420,50 460,100 500,180 550,245" fill="none" stroke="#26313f" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><circle cx="200" cy="195" r="7" fill="none" stroke="#c73e2e" stroke-width="2"/><text x="190" y="178" font-size="11" fill="#c73e2e" text-anchor="end" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">①購入</text><circle cx="260" cy="150" r="7" fill="none" stroke="#c73e2e" stroke-width="2"/><text x="250" y="133" font-size="11" fill="#c73e2e" text-anchor="end"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">②利益確定（一度は勝ち逃げ）</text><circle cx="380" cy="55" r="7" fill="none" stroke="#0075c2" stroke-width="2.2"/><text x="370" y="40" font-size="11" fill="#0075c2" text-anchor="end" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">③高値圏で再参入</text><circle cx="500" cy="180" r="7" fill="none" stroke="#0075c2" stroke-width="2.2"/><text x="512" y="185" font-size="11" fill="#0075c2" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">④暴落で大損</text><text x="320" y="280" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「天体の動きは計算できるが、人々の狂気は計算できない」（ニュートンの言葉と伝えられる）</text>
</svg>