<text x="320" y="24" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">トレンドライン：安値2点で引き、3点目のタッチで信頼度が上がる</text><line x1="60" y1="250" x2="560" y2="110" stroke="#c73e2e" stroke-width="2.5"  stroke-linecap="round"/><line x1="60" y1="175" x2="560" y2="35" stroke="#c73e2e" stroke-width="1.8" stroke-dasharray="7 5" stroke-linecap="round"/><text x="505" y="42" font-size="10" fill="#c73e2e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">チャネルライン（平行線）</text><polyline points="70,245 110,195 150,230 200,160 250,205 300,130 350,180 400,105 450,155 500,80 540,120" fill="none" stroke="#26313f" stroke-width="2.2"  stroke-linejoin="round" stroke-linecap="round"/><circle cx="70" cy="245" r="6" fill="none" stroke="#c73e2e" stroke-width="2.5"/><text x="70" y="269" font-size="10.5" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">①</text><circle cx="150" cy="230" r="6" fill="none" stroke="#c73e2e" stroke-width="2.5"/><text x="150" y="254" font-size="10.5" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">②</text><circle cx="350" cy="180" r="6" fill="none" stroke="#c73e2e" stroke-width="2.5"/><text x="350" y="204" font-size="10.5" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">③</text><text x="320" y="290" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">①②で仮に引き、③で「機能しているライン」と確認。ヒゲと実体のどちらで引くかは一貫させる（模式図）</text>
