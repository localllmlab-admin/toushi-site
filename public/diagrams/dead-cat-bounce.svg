<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 315" role="img">
<rect width="640" height="315" fill="#ffffff"/>
<line x1="0" y1="63" x2="640" y2="63" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="126" x2="640" y2="126" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="189" x2="640" y2="189" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="252" x2="640" y2="252" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="24" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">デッド・キャット・バウンス：急落後の反発が続かない</text><polyline points="60,70 110,85 150,110 190,170 230,220" fill="none" stroke="#0075c2" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><polyline points="230,220 270,195 310,180" fill="none" stroke="#c73e2e" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><polyline points="310,180 350,200 400,235 460,255 530,270" fill="none" stroke="#0075c2" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><text x="140" y="70" font-size="10.5" fill="#0075c2" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">急落（悪材料）</text><text x="310" y="148" font-size="9.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">小さな反発：売り方の買い戻し・値ごろ感の買い</text><text x="310" y="166" font-size="10.5" fill="#c73e2e" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">戻りは浅い</text><text x="470" y="230" font-size="10.5" fill="#0075c2" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">戻り切れずに再下落</text><line x1="60" y1="180" x2="560" y2="180" stroke="#dde3ec" stroke-width="1" stroke-dasharray="4 4" stroke-linecap="round"/><text x="320" y="300" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">急落後の反発だけでは転換と判断できない。出来高や戻りの深さなど複数の根拠で点検する（模式図）</text>
</svg>