<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" role="img">
<rect width="640" height="300" fill="#ffffff"/>
<line x1="0" y1="60" x2="640" y2="60" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="120" x2="640" y2="120" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="180" x2="640" y2="180" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="240" x2="640" y2="240" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="24" font-size="13" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">制限値幅：1日に動ける範囲は基準値段で決まる</text><line x1="80" y1="60" x2="80" y2="240" stroke="#dde3ec" stroke-width="1.5"  stroke-linecap="round"/><line x1="60" y1="90" x2="300" y2="90" stroke="#c73e2e" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round"/><text x="310" y="94" font-size="11" fill="#c73e2e" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">上限＝ストップ高</text><line x1="60" y1="150" x2="300" y2="150" stroke="#26313f" stroke-width="2"  stroke-linecap="round"/><text x="310" y="154" font-size="11" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">基準値段（前日終値）</text><line x1="60" y1="210" x2="300" y2="210" stroke="#0075c2" stroke-width="2" stroke-dasharray="6 4" stroke-linecap="round"/><text x="310" y="214" font-size="11" fill="#0075c2" text-anchor="start" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">下限＝ストップ安</text><line x1="90" y1="150" x2="90" y2="95" stroke="#c73e2e" stroke-width="2"  stroke-linecap="round"/><polygon points="90,95 93.91468980700107,103.10402392117409 86.08531019299893,103.10402392117409" fill="#c73e2e"/><line x1="90" y1="150" x2="90" y2="205" stroke="#0075c2" stroke-width="2"  stroke-linecap="round"/><polygon points="90,205 86.08531019299893,196.8959760788259 93.91468980700107,196.8959760788259" fill="#0075c2"/><text x="110" y="122" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">水準別の金額で</text><text x="110" y="137" font-size="10" fill="#57606e" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">上下幅が決まる</text><polyline points="130,190 160,170 185,178 215,130 240,110 265,92 295,90" fill="none" stroke="#26313f" stroke-width="2.2"  stroke-linejoin="round" stroke-linecap="round"/><rect x="440" y="60" width="170" height="180" rx="8" fill="#ffffff" stroke="#a3690f" stroke-width="2"/><text x="525" y="84" font-size="11.5" fill="#a3690f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ストップ高に張り付き</text><rect x="455" y="100" width="42" height="14" rx="2" fill="#c73e2e" opacity="0.55"/><rect x="505" y="100" width="42" height="14" rx="2" fill="#c73e2e" opacity="0.55"/><rect x="555" y="100" width="42" height="14" rx="2" fill="#c73e2e" opacity="0.55"/><rect x="455" y="120" width="42" height="14" rx="2" fill="#c73e2e" opacity="0.55"/><rect x="505" y="120" width="42" height="14" rx="2" fill="#c73e2e" opacity="0.55"/><text x="525" y="152" font-size="10" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">買い注文が積み上がる</text><text x="525" y="176" font-size="10" fill="#26313f" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">取引は停止しない。</text><text x="525" y="194" font-size="10" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">引けまで対当しなければ</text><text x="525" y="212" font-size="10.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">大引けに比例配分</text><text x="320" y="272" font-size="10.5" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">ストップ高でも売買は成立しうる／買えない・売れないまま翌日へ持ち越すリスクが制度上ありえる</text>
</svg>