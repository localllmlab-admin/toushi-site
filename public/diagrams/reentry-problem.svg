<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 295" role="img">
<rect width="640" height="295" fill="#ffffff"/>
<line x1="0" y1="59" x2="640" y2="59" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="118" x2="640" y2="118" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="177" x2="640" y2="177" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/><line x1="0" y1="236" x2="640" y2="236" stroke="#dde3ec" stroke-width="1"  stroke-linecap="round"/>
<text x="320" y="26" font-size="12.5" fill="#26313f" text-anchor="middle" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">「売った後に上がる」は正常。問題は感情での買い直し</text><polyline points="50,240 120,200 180,215 250,160 310,175 370,120 430,135 500,80 570,60" fill="none" stroke="#26313f" stroke-width="2.5"  stroke-linejoin="round" stroke-linecap="round"/><circle cx="370" cy="120" r="8" fill="none" stroke="#c73e2e" stroke-width="2.2"/><text x="360" y="103" font-size="12" fill="#c73e2e" text-anchor="end" font-weight="700" font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">計画通り利確</text><circle cx="500" cy="80" r="8" fill="none" stroke="#0075c2" stroke-width="2.2"/><text x="512" y="76" font-size="11.5" fill="#0075c2" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">悔しさで飛び乗り直すと</text><text x="512" y="93" font-size="11.5" fill="#0075c2" text-anchor="start"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">高値掴みの入口に</text><text x="320" y="280" font-size="11" fill="#57606e" text-anchor="middle"  font-family="Hiragino Sans, Noto Sans JP, Meiryo, sans-serif">再エントリーは「悔しさ」ではなく「新規の買い条件を再び満たしたか」で判定する（押し目・ブレイク等）</text>
</svg>